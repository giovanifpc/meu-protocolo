<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Meu Protocolo — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#3BB08F; --text:#1E2A3A;
    --line:#E2E5EA; --card:#FFFFFF; --muted:#6B7684; --danger:#C0392B; --font:'Inter', sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); }
  header h1 { font-size:18px; font-weight:700; margin:0; }
  .trial-banner { background:#FFF4E5; border-bottom:1px solid #F5C98B; color:#8A5A00; font-size:13px; padding:8px 20px; text-align:center; }
  main { max-width:720px; margin:0 auto; padding:20px 20px 90px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .stat-row { display:flex; gap:12px; margin-bottom:16px; }
  .stat-card { flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 10px; text-align:center; }
  .stat-card .num { font-size:24px; font-weight:700; color:var(--primary); line-height:1; }
  .stat-card .lbl { font-size:11px; color:var(--muted); margin-top:6px; }
  .attention-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .attention-row:last-child { border-bottom:none; }
  .attention-name { font-weight:600; }
  .attention-days { color:#8A5A00; font-size:12px; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); text-decoration:none; display:inline-block; }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:720px; margin:0 auto; height:64px; background:var(--card); border-top:1px solid var(--line); display:flex; z-index:60; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--muted); text-decoration:none; font-family:var(--font); padding-top:6px; }
  .nav-btn .nav-ico { font-size:20px; line-height:1; }
  .nav-btn .nav-lbl { font-size:10px; font-weight:700; }
  .nav-btn.active { color:var(--primary); }
</style>
</head>
<body>
  <div id="trialBanner" class="trial-banner" style="display:none;"></div>
  <header>
    <h1 id="profName">Meu Protocolo</h1>
    <button class="btn secondary" id="logoutBtn">Sair</button>
  </header>

  <main>
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="statStudents">—</div><div class="lbl">alunos</div></div>
      <div class="stat-card"><div class="num" id="statWeek">—</div><div class="lbl">treinos essa semana</div></div>
    </div>

    <div class="card">
      <h2>Precisam de atenção</h2>
      <div id="attentionList"><div class="empty">Carregando...</div></div>
    </div>

    <div class="card" style="text-align:center;">
      <a class="btn" href="alunos.html">Ver todos os alunos</a>
    </div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-btn active" href="index.html"><span class="nav-ico">🏠</span><span class="nav-lbl">Início</span></a>
    <a class="nav-btn" href="alunos.html"><span class="nav-ico">👥</span><span class="nav-lbl">Alunos</span></a>
    <a class="nav-btn" href="relatorios.html"><span class="nav-ico">📄</span><span class="nav-lbl">Relatórios</span></a>
    <a class="nav-btn" href="perfil.html"><span class="nav-ico">⚙️</span><span class="nav-lbl">Config</span></a>
  </nav>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function boot() {
    const { data: { session } } = await supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: pro, error } = await supa.from('professionals').select('*').eq('email', session.user.email).maybeSingle();
    if (error) {
      console.error('Falha ao carregar professional:', error.message);
      document.querySelector('main').innerHTML = `<div class="card"><p style="color:var(--danger)">Erro ao carregar sua conta: ${escapeHtml(error.message)}</p></div>`;
      return;
    }
    if (!pro) { window.location.href = 'onboarding.html'; return; }

    professional = pro;
    $('profName').textContent = pro.display_name;

    if (pro.status === 'trial' && pro.trial_ends_at) {
      const daysLeft = Math.ceil((new Date(pro.trial_ends_at) - new Date()) / (1000 * 60 * 60 * 24));
      $('trialBanner').style.display = 'block';
      $('trialBanner').textContent = daysLeft > 0
        ? `Trial gratuito: ${daysLeft} dia(s) restante(s).`
        : 'Seu trial terminou. A cobrança automática deve ocorrer em breve.';
    }

    await loadDashboard();
  }

  async function loadDashboard() {
    const { data: students, error: studentsErr } = await supa.from('students').select('id, nome').eq('professional_id', professional.id);
    if (studentsErr || !students) { $('attentionList').innerHTML = '<div class="empty">Erro ao carregar alunos.</div>'; return; }

    $('statStudents').textContent = students.length;

    if (!students.length) {
      $('statWeek').textContent = '0';
      $('attentionList').innerHTML = '<div class="empty">Cadastre seu primeiro aluno pra começar.</div>';
      return;
    }

    const studentIds = students.map(s => s.id);
    const [{ data: history }, { data: notes }] = await Promise.all([
      supa.from('training_history').select('student_id, completed_at').in('student_id', studentIds).order('completed_at', { ascending: false }),
      supa.from('student_notes').select('student_id, status').eq('professional_id', professional.id),
    ]);

    const sevenDaysAgo = Date.now() - 7 * 86400000;
    const weekCount = (history || []).filter(h => new Date(h.completed_at).getTime() >= sevenDaysAgo).length;
    $('statWeek').textContent = weekCount;

    const lastByStudent = {};
    (history || []).forEach(h => {
      if (!lastByStudent[h.student_id]) lastByStudent[h.student_id] = h.completed_at;
    });
    const statusByStudent = {};
    (notes || []).forEach(n => { statusByStudent[n.student_id] = n.status; });

    const attention = students
      .filter(s => (statusByStudent[s.id] || 'ativo') === 'ativo')
      .map(s => {
        const last = lastByStudent[s.id];
        const days = last ? Math.floor((Date.now() - new Date(last).getTime()) / 86400000) : null;
        return { nome: s.nome, days };
      }).filter(s => s.days === null || s.days >= 7).sort((a, b) => (b.days ?? 999) - (a.days ?? 999));

    if (!attention.length) {
      $('attentionList').innerHTML = '<div class="empty">Todo mundo treinando em dia. 🎉</div>';
      return;
    }
    $('attentionList').innerHTML = attention.map(s => `
      <div class="attention-row">
        <span class="attention-name">${escapeHtml(s.nome)}</span>
        <span class="attention-days">${s.days === null ? 'nunca treinou' : `há ${s.days} dias`}</span>
      </div>
    `).join('');
  }

  $('logoutBtn').addEventListener('click', async () => {
    await supa.auth.signOut();
    window.location.href = 'login.html';
  });

  boot();
</script>
</body>
</html>
