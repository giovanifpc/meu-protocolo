<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#1E8C64; --accent-dim:#146B4D; --text:#1E2A3A;
    --line:#E9EBEF; --card:#FFFFFF; --muted:#63707F; --faint:#94A0AF; --danger:#C0392B; --font:'Inter', sans-serif;
    --radius:14px; --radius-lg:18px;
    --card-grad:linear-gradient(165deg,#FFFFFF 0%,#F7FBF9 55%,#F6F8FE 100%);
    --shadow-sm:0 1px 2px rgba(20,30,45,.05);
    --shadow-card:0 1px 2px rgba(20,30,45,.04), 0 10px 24px -14px rgba(20,30,45,.14);
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); }
  header h1 { font-size:18px; font-weight:700; margin:0; }
  .trial-banner { background:#FFF4E5; border-bottom:1px solid #F5C98B; color:#8A5A00; font-size:13px; padding:8px 20px; text-align:center; }
  main { max-width:720px; margin:0 auto; padding:20px 20px 90px; }
  .card { background:var(--card-grad); border:1px solid rgba(20,30,45,.04); box-shadow:var(--shadow-card); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .stat-row { display:flex; gap:12px; margin-bottom:16px; }
  .stat-card { flex:1; background:var(--card-grad); border:1px solid rgba(20,30,45,.04); box-shadow:var(--shadow-card); border-radius:var(--radius); padding:16px 10px; text-align:center; }
  .stat-card .num { font-size:25px; font-weight:800; color:var(--primary); line-height:1; letter-spacing:-.3px; }
  .stat-card .lbl { font-size:11px; color:var(--muted); margin-top:6px; font-weight:500; }
  .attention-item { border-bottom:1px solid var(--line); padding:9px 0; }
  .attention-item:last-child { border-bottom:none; }
  .attention-row { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:13px; cursor:pointer; }
  .attention-name { font-weight:600; }
  .attention-tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; text-transform:uppercase; white-space:nowrap; }
  .attention-tag.adesao { background:#FFF4E5; color:#8A5A00; }
  .attention-tag.pagamento { background:#FDEDEC; color:var(--danger); }
  .attention-detail { display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
  .attention-detail.open { display:block; }
  .attention-detail textarea { width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:13px; color:var(--text); font-family:var(--font); min-height:70px; resize:vertical; margin-bottom:8px; }
  .attention-detail .hint { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .btn.whatsapp { background:#25D366; }
  .msg { font-size:12px; margin-top:6px; }
  .msg.error { color:var(--danger); }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); text-decoration:none; display:inline-block; transition:transform .15s ease; }
  .btn:active { transform:scale(.97); }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:720px; margin:0 auto; height:64px; background:var(--card); border-top:1px solid var(--line); display:flex; z-index:60; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--faint); text-decoration:none; font-family:var(--font); padding-top:6px; }
  .nav-btn .nav-ico { width:22px; height:22px; line-height:1; }
  .nav-btn .nav-ico svg { width:100%; height:100%; display:block; }
  .nav-btn .nav-lbl { font-size:10px; font-weight:700; }
  .nav-btn.active { color:var(--primary); }
</style>
</head>
<body>
  <div id="trialBanner" class="trial-banner" style="display:none;"></div>
  <header>
    <h1 id="profName">Meu Protocolo</h1>
    <button class="btn secondary" id="logoutBtn">Sair</button>
  </header>

  <main>
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="statStudents">—</div><div class="lbl">alunos</div></div>
      <div class="stat-card"><div class="num" id="statWeek">—</div><div class="lbl">treinos essa semana</div></div>
    </div>

    <div class="card">
      <h2>Alertas</h2>
      <div id="attentionList"><div class="empty">Carregando...</div></div>
    </div>

    <div class="card" style="text-align:center;">
      <a class="btn" href="alunos.html">Ver todos os alunos</a>
    </div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-btn active" href="index.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg></span><span class="nav-lbl">Início</span></a>
    <a class="nav-btn" href="alunos.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span class="nav-lbl">Alunos</span></a>
    <a class="nav-btn" href="relatorios.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg></span><span class="nav-lbl">Relatórios</span></a>
    <a class="nav-btn" href="perfil.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.7.36 1.15 1.03 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span class="nav-lbl">Config</span></a>
  </nav>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function boot() {
    const { data: { session } } = await supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: pro, error } = await supa.from('professionals').select('*').eq('email', session.user.email).maybeSingle();
    if (error) {
      console.error('Falha ao carregar professional:', error.message);
      document.querySelector('main').innerHTML = `<div class="card"><p style="color:var(--danger)">Erro ao carregar sua conta: ${escapeHtml(error.message)}</p></div>`;
      return;
    }
    if (!pro) { window.location.href = 'onboarding.html'; return; }

    professional = pro;
    $('profName').textContent = pro.display_name;

    if (pro.status === 'trial' && pro.trial_ends_at) {
      $('trialBanner').style.display = 'block';
      if (pro.billing_exempt) {
        // Conta isenta (teste interno / programa Founder) nunca tem cartão
        // cadastrado — não existe cobrança automática nenhuma pra avisar.
        $('trialBanner').textContent = 'Sua conta está isenta de cobrança.';
      } else {
        const daysLeft = Math.ceil((new Date(pro.trial_ends_at) - new Date()) / (1000 * 60 * 60 * 24));
        $('trialBanner').textContent = daysLeft > 0
          ? `Trial gratuito: ${daysLeft} dia(s) restante(s).`
          : 'Seu trial terminou. A cobrança automática deve ocorrer em breve.';
      }
    }

    await loadDashboard();
  }

  function computeDueInfo(s) {
    if (!s.mensalidade_dia_vencimento) return null;
    const day = s.mensalidade_dia_vencimento;
    const base = s.ultimo_pagamento_em ? new Date(s.ultimo_pagamento_em + 'T00:00:00') : new Date(s.created_at);
    const monthOffset = s.ultimo_pagamento_em ? 1 : 0;
    const due = new Date(base.getFullYear(), base.getMonth() + monthOffset, day);
    const daysLate = Math.floor((Date.now() - due.getTime()) / 86400000);
    return { due, daysLate };
  }

  function firstName(nome) { return (nome || '').trim().split(' ')[0]; }

  function buildAdherenceMessage(s, days) {
    const nome = firstName(s.nome);
    return days === null
      ? `Oi ${nome}! Vi que você ainda não começou seu treino por aqui. Bora começar? Qualquer dúvida me chama! 💪`
      : `Oi ${nome}! Notei que você não treina há ${days} dias. Bora retomar? Se tiver alguma dificuldade me chama que a gente ajusta o treino juntos. 💪`;
  }

  function buildPaymentMessage(s, due) {
    const nome = firstName(s.nome);
    const valor = s.mensalidade_valor ? `R$ ${Number(s.mensalidade_valor).toFixed(2)}` : 'sua mensalidade';
    return `Oi ${nome}! Passando pra lembrar que ${valor} venceu em ${due.toLocaleDateString('pt-BR')} e ainda não recebi por aqui. Pode verificar pra mim? Qualquer coisa me avisa 🙏`;
  }

  function waLink(telefone, msg) {
    return `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;
  }

  async function loadDashboard() {
    const { data: students, error: studentsErr } = await supa.from('students').select('*').eq('professional_id', professional.id);
    if (studentsErr || !students) { $('attentionList').innerHTML = '<div class="empty">Erro ao carregar alunos.</div>'; return; }

    $('statStudents').textContent = students.length;

    if (!students.length) {
      $('statWeek').textContent = '0';
      $('attentionList').innerHTML = '<div class="empty">Cadastre seu primeiro aluno pra começar.</div>';
      return;
    }

    const studentIds = students.map(s => s.id);
    const [{ data: history }, { data: notes }] = await Promise.all([
      supa.from('training_history').select('student_id, completed_at').in('student_id', studentIds).order('completed_at', { ascending: false }),
      supa.from('student_notes').select('student_id, status').eq('professional_id', professional.id),
    ]);

    const sevenDaysAgo = Date.now() - 7 * 86400000;
    const weekCount = (history || []).filter(h => new Date(h.completed_at).getTime() >= sevenDaysAgo).length;
    $('statWeek').textContent = weekCount;

    const lastByStudent = {};
    (history || []).forEach(h => {
      if (!lastByStudent[h.student_id]) lastByStudent[h.student_id] = h.completed_at;
    });
    const statusByStudent = {};
    (notes || []).forEach(n => { statusByStudent[n.student_id] = n.status; });

    const activeStudents = students.filter(s => (statusByStudent[s.id] || 'ativo') === 'ativo');

    const adherenceAlerts = activeStudents.map(s => {
      const last = lastByStudent[s.id];
      const days = last ? Math.floor((Date.now() - new Date(last).getTime()) / 86400000) : null;
      return { tipo: 'adesao', student: s, days };
    }).filter(a => a.days === null || a.days >= 7);

    const paymentAlerts = activeStudents.map(s => {
      const info = computeDueInfo(s);
      return info && info.daysLate > 0 ? { tipo: 'pagamento', student: s, daysLate: info.daysLate, due: info.due } : null;
    }).filter(Boolean);

    const alerts = [...paymentAlerts, ...adherenceAlerts].sort((a, b) => {
      const aVal = a.tipo === 'pagamento' ? a.daysLate + 1000 : (a.days ?? 999);
      const bVal = b.tipo === 'pagamento' ? b.daysLate + 1000 : (b.days ?? 999);
      return bVal - aVal;
    });

    if (!alerts.length) {
      $('attentionList').innerHTML = '<div class="empty">Tudo em dia — treino e mensalidade. 🎉</div>';
      return;
    }

    $('attentionList').innerHTML = alerts.map((a, i) => {
      const s = a.student;
      const tag = a.tipo === 'pagamento'
        ? `${a.daysLate} dia(s) em atraso`
        : (a.days === null ? 'nunca treinou' : `há ${a.days} dias sem treinar`);
      const msg = a.tipo === 'pagamento' ? buildPaymentMessage(s, a.due) : buildAdherenceMessage(s, a.days);
      return `
      <div class="attention-item">
        <div class="attention-row" data-role="toggle-alert" data-idx="${i}">
          <span class="attention-name">${escapeHtml(s.nome)}</span>
          <span class="attention-tag ${a.tipo}">${escapeHtml(tag)}</span>
        </div>
        <div class="attention-detail" id="alertDetail-${i}">
          <textarea id="alertMsg-${i}">${escapeHtml(msg)}</textarea>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            ${s.telefone
              ? `<a class="btn whatsapp" id="alertWaBtn-${i}" target="_blank" rel="noopener">Abrir no WhatsApp</a>`
              : `<div class="hint">Cadastre o WhatsApp desse aluno em "Alunos" pra poder enviar direto por aqui.</div>`}
            <button class="btn secondary" id="alertPushBtn-${i}" data-student-id="${s.id}" type="button">Notificar no app</button>
          </div>
          <div class="msg" id="alertPushMsg-${i}"></div>
        </div>
      </div>`;
    }).join('');

    $('attentionList').querySelectorAll('[data-role="toggle-alert"]').forEach(row => {
      row.addEventListener('click', () => {
        $('alertDetail-' + row.dataset.idx).classList.toggle('open');
      });
    });
    alerts.forEach((a, i) => {
      const waBtn = $('alertWaBtn-' + i);
      if (waBtn) {
        const update = () => { waBtn.href = waLink(a.student.telefone, $('alertMsg-' + i).value); };
        update();
        $('alertMsg-' + i).addEventListener('input', update);
      }
      const pushBtn = $('alertPushBtn-' + i);
      pushBtn.addEventListener('click', async () => {
        pushBtn.disabled = true;
        const title = a.tipo === 'pagamento' ? 'Lembrete de pagamento' : 'Sentimos sua falta!';
        const { data, error } = await supa.functions.invoke('send-push', {
          body: { student_id: pushBtn.dataset.studentId, title, body: $('alertMsg-' + i).value },
        });
        pushBtn.disabled = false;
        const out = $('alertPushMsg-' + i);
        if (error || data?.error) {
          let motivo = data?.error || error?.message || 'erro desconhecido';
          if (error?.context?.json) {
            try {
              const body = await error.context.json();
              if (body?.error) motivo = body.error;
            } catch {}
          }
          out.textContent = 'Erro ao notificar: ' + motivo;
          out.className = 'msg error';
          return;
        }
        out.textContent = data.sent > 0 ? 'Notificação enviada.' : (data.message || 'Aluno sem notificações ativadas.');
        out.className = 'msg';
      });
    });
  }

  $('logoutBtn').addEventListener('click', async () => {
    await supa.auth.signOut();
    window.location.href = 'login.html';
  });

  boot();
</script>
</body>
</html>
