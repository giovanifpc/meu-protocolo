<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://drive.google.com https://*.supabase.co; connect-src 'self' https://yumqmramxbahkfxsthtt.supabase.co wss://yumqmramxbahkfxsthtt.supabase.co https://o4511757250199552.ingest.us.sentry.io; object-src 'none'; base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="icons/favicon-32-v2.png">
<link rel="manifest" href="manifest-painel.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-v2.png">
<meta name="theme-color" content="#F8F9FA">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Meu Protocolo — Nutri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://js.sentry-cdn.com/dd3ca3ee7a720284b2a9bf8240b29158.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="support-widget.js" defer></script>
<script src="assistant-hints.js" defer></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch((e) => console.error('Falha ao registrar service worker:', e));</script>
<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#1E8C64; --accent-dim:#146B4D; --text:#1E2A3A;
    --line:#E9EBEF; --card:#FFFFFF; --muted:#63707F; --faint:#94A0AF; --danger:#C0392B; --font:'Inter', sans-serif;
    --radius:14px; --radius-lg:18px;
    --card-grad:linear-gradient(165deg,#FFFFFF 0%,#F7FBF9 55%,#F6F8FE 100%);
    --shadow-card:0 1px 2px rgba(20,30,45,.04), 0 10px 24px -14px rgba(20,30,45,.14);
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); gap:12px; }
  header h1 { font-size:17px; font-weight:700; margin:0; }
  .tabbar { display:none; gap:4px; padding:8px 20px; background:var(--card); border-bottom:1px solid var(--line); max-width:720px; margin:0 auto; }
  .tab-link { flex:1; text-align:center; padding:8px 4px; border-radius:8px; font-size:12px; font-weight:700; color:var(--muted); text-decoration:none; transition:.15s; }
  .tab-link.active { background:var(--primary); color:#fff; }
  main { max-width:720px; margin:0 auto; padding:20px; }
  .card { background:var(--card-grad); border:1px solid rgba(20,30,45,.04); box-shadow:var(--shadow-card); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .field select, .field textarea { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); font-family:var(--font); }
  .field select:focus, .field textarea:focus { outline:none; border-color:var(--primary); }
  .field textarea { resize:vertical; min-height:140px; line-height:1.5; }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); transition:transform .15s ease; }
  .btn:active { transform:scale(.97); }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .btn.small { padding:7px 12px; font-size:12px; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .pdf-current { display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px; font-size:13px; }
  .pdf-current .pdf-name { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:16px 0; }
  .msg { font-size:13px; margin-top:8px; }
  .msg.error { color:var(--danger); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
</style>
</head>
<body>
  <header>
    <h1>Nutri</h1>
    <a href="alunos.html" class="btn secondary small">‹ Alunos</a>
  </header>

  <div class="tabbar" id="studentTabbar">
    <a href="#" id="tabTreino" class="tab-link">Treino</a>
    <a href="#" id="tabAvaliacao" class="tab-link">Avaliação</a>
    <a href="#" id="tabNutri" class="tab-link active">Nutrição</a>
  </div>

  <main>
    <div class="card">
      <div class="field">
        <label>Aluno</label>
        <select id="studentSelect"><option value="">Selecione um aluno...</option></select>
      </div>
    </div>

    <div id="editorArea" style="display:none;">
      <div class="card">
        <h2>Orientação atual</h2>
        <div class="field">
          <textarea id="orientacaoInput" placeholder="Ex: Beber 2L de água por dia, priorizar proteína nas refeições principais, evitar açúcar refinado à noite..."></textarea>
        </div>
      </div>

      <div class="card">
        <h2>PDF do plano nutricional</h2>
        <div id="pdfCurrentArea"></div>
        <div class="field">
          <label>Substituir PDF (opcional)</label>
          <input type="file" id="pdfInput" accept="application/pdf">
        </div>
      </div>

      <div class="card" style="display:flex; gap:10px;">
        <button class="btn" id="saveBtn">Salvar</button>
        <span class="msg" id="saveMsg"></span>
      </div>
    </div>
  </main>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;
  let currentGuidance = null; // { id, student_id, orientacao, pdf_path, pdf_nome }

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }
  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateTabbar(studentId) {
    const bar = $('studentTabbar');
    if (!studentId) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    $('tabTreino').href = 'treinos.html?student_id=' + studentId;
    $('tabAvaliacao').href = 'avaliacoes.html?student_id=' + studentId;
  }

  async function boot() {
    const { data: { session } } = await supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: pro, error } = await supa.from('professionals').select('*').eq('email', session.user.email).maybeSingle();
    if (error) { console.error(error.message); return; }
    if (!pro) { window.location.href = 'onboarding.html'; return; }
    professional = pro;

    await loadStudents();

    const params = new URLSearchParams(window.location.search);
    const preselect = params.get('student_id');
    if (preselect) {
      $('studentSelect').value = preselect;
      updateTabbar(preselect);
      await loadOrCreateGuidance(preselect);
    }
  }

  async function loadStudents() {
    const { data, error } = await supa.from('students').select('*').eq('professional_id', professional.id).order('nome');
    const select = $('studentSelect');
    if (error || !data) return;
    data.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.nome;
      select.appendChild(opt);
    });
  }

  $('studentSelect').addEventListener('change', async (e) => {
    const studentId = e.target.value;
    updateTabbar(studentId);
    if (!studentId) { $('editorArea').style.display = 'none'; return; }
    await loadOrCreateGuidance(studentId);
  });

  async function loadOrCreateGuidance(studentId) {
    const { data, error } = await supa
      .from('nutrition_guidance')
      .select('*')
      .eq('student_id', studentId)
      .maybeSingle();

    if (error) { console.error(error.message); toast('Erro ao carregar orientação.'); return; }

    currentGuidance = data || { id: null, student_id: studentId, orientacao: '', pdf_path: null, pdf_nome: null };
    $('orientacaoInput').value = currentGuidance.orientacao || '';
    $('pdfInput').value = '';
    renderPdfCurrent();
    $('editorArea').style.display = 'block';
  }

  function renderPdfCurrent() {
    const area = $('pdfCurrentArea');
    if (!currentGuidance.pdf_path) {
      area.innerHTML = '<div class="empty">Nenhum PDF enviado ainda.</div>';
      return;
    }
    area.innerHTML = `
      <div class="pdf-current">
        <span class="pdf-name"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:5px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>${escapeHtml(currentGuidance.pdf_nome || 'plano.pdf')}</span>
        <button class="btn secondary small" id="viewPdfBtn" type="button">Ver PDF</button>
      </div>`;
    $('viewPdfBtn').addEventListener('click', async () => {
      const { data, error } = await supa.storage.from('nutri-pdfs').createSignedUrl(currentGuidance.pdf_path, 300);
      if (error) { toast('Erro ao gerar link do PDF: ' + error.message); return; }
      window.open(data.signedUrl, '_blank');
    });
  }

  $('saveBtn').addEventListener('click', async () => {
    $('saveBtn').disabled = true;
    $('saveMsg').textContent = '';
    $('saveMsg').className = 'msg';

    const orientacao = $('orientacaoInput').value.trim();
    const file = $('pdfInput').files[0];
    let pdfPath = currentGuidance.pdf_path;
    let pdfNome = currentGuidance.pdf_nome;

    if (file) {
      const newPath = `${currentGuidance.student_id}/${Date.now()}-${file.name}`;
      const { error: uploadErr } = await supa.storage.from('nutri-pdfs').upload(newPath, file, { contentType: 'application/pdf' });
      if (uploadErr) {
        $('saveMsg').textContent = 'Erro ao enviar PDF: ' + uploadErr.message;
        $('saveMsg').className = 'msg error';
        $('saveBtn').disabled = false;
        return;
      }
      if (pdfPath) await supa.storage.from('nutri-pdfs').remove([pdfPath]);
      pdfPath = newPath;
      pdfNome = file.name;
    }

    const payload = {
      professional_id: professional.id,
      student_id: currentGuidance.student_id,
      orientacao,
      pdf_path: pdfPath,
      pdf_nome: pdfNome,
    };

    const { data, error } = currentGuidance.id
      ? await supa.from('nutrition_guidance').update(payload).eq('id', currentGuidance.id).select().single()
      : await supa.from('nutrition_guidance').insert(payload).select().single();

    $('saveBtn').disabled = false;
    if (error) {
      $('saveMsg').textContent = 'Erro ao salvar: ' + error.message;
      $('saveMsg').className = 'msg error';
      return;
    }
    currentGuidance = data;
    renderPdfCurrent();
    toast('Salvo com sucesso.');
  });

  boot();
</script>
</body>
</html>
