<html lang="pt-BR">
<head>

<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#1E8C64; --accent-dim:#146B4D; --text:#1E2A3A;
    --line:#E9EBEF; --card:#FFFFFF; --muted:#63707F; --faint:#94A0AF; --danger:#C0392B; --font:'Inter', sans-serif;
    --radius:14px; --radius-lg:18px;
    --card-grad:linear-gradient(165deg,#FFFFFF 0%,#F7FBF9 55%,#F6F8FE 100%);
    --shadow-card:0 1px 2px rgba(20,30,45,.04), 0 10px 24px -14px rgba(20,30,45,.14);
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); gap:12px; }
  header h1 { font-size:17px; font-weight:700; margin:0; }
  .tabbar { display:none; gap:4px; padding:8px 20px; background:var(--card); border-bottom:1px solid var(--line); max-width:720px; margin:0 auto; }
  .tab-link { flex:1; text-align:center; padding:8px 4px; border-radius:8px; font-size:12px; font-weight:700; color:var(--muted); text-decoration:none; transition:.15s; }
  .tab-link.active { background:var(--primary); color:#fff; }
  main { max-width:720px; margin:0 auto; padding:20px; }
  .card { background:var(--card-grad); border:1px solid rgba(20,30,45,.04); box-shadow:var(--shadow-card); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .field input, .field select { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); font-family:var(--font); }
  .field input:focus, .field select:focus { outline:none; border-color:var(--primary); }
  .row.three { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); transition:transform .15s ease; }
  .btn:active { transform:scale(.97); }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .btn.danger { background:#FDEDEC; color:var(--danger); border:1px solid #F5C6C0; }
  .btn.small { padding:6px 10px; font-size:12px; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .workout-block { background:var(--card-grad); border:1px solid rgba(20,30,45,.04); box-shadow:var(--shadow-card); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
  .workout-block-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .workout-block-header input { font-weight:700; font-size:14px; border:none; background:transparent; padding:4px 0; flex:1; }
  .workout-block-header input:focus { outline:none; border-bottom:1px solid var(--primary); }
  .weekday-picker { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
  .wd-btn { padding:5px 8px; border-radius:6px; border:1px solid var(--line); background:var(--bg); color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; font-family:var(--font); }
  .wd-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .exercise-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .exercise-row:last-child { border-bottom:none; }
  .exercise-row .ex-meta { color:var(--muted); font-size:12px; }
  .exercise-row-edit { flex-wrap:wrap; }
  .ex-name-col { font-weight:600; flex:1 1 100%; margin-bottom:4px; }
  .tecnica-chip { display:inline-block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.3px; color:var(--primary); background:rgba(45,107,228,.1); padding:2px 8px; border-radius:6px; margin-bottom:4px; }
  .ex-note { font-size:11.5px; color:var(--muted); flex:1 1 100%; margin:-2px 0 4px; }
  .ex-fields { display:flex; align-items:center; gap:4px; }
  .ex-field-input { width:44px; padding:5px 4px; text-align:center; border:1px solid var(--line); border-radius:6px; font-size:12px; font-family:var(--font); }
  .ex-field-input:focus { outline:none; border-color:var(--primary); }
  .ex-field-rest { width:52px; }
  .ex-field-x, .ex-field-unit { color:var(--muted); font-size:12px; }
  .search-box { position:relative; margin-top:8px; }
  .search-results { position:absolute; z-index:20; top:100%; left:0; right:0; background:var(--card); border:1px solid var(--line); border-radius:12px; margin-top:4px; max-height:240px; overflow-y:auto; box-shadow:0 14px 34px -12px rgba(20,30,45,.22); }
  .search-result-item { padding:9px 12px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--line); }
  .search-result-item:last-child { border-bottom:none; }
  .search-result-item:hover { background:var(--bg); }
  .search-result-item .grupo { color:var(--muted); font-size:11px; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:16px 0; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
  .status-tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; text-transform:uppercase; }
  .status-tag.rascunho { background:#FFF4E5; color:#8A5A00; }
  .status-tag.publicado { background:#E7F7F1; color:#1B7A55; }
  .periodization-row { display:grid; grid-template-columns:2fr 1fr; gap:8px; margin-bottom:10px; }
  .periodization-hint { font-size:12px; color:var(--muted); margin:-4px 0 12px; line-height:1.5; }
  .ex-name-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
  .exercise-row-multi { padding:10px 0; border-bottom:1px solid var(--line); }
  .exercise-row-multi:last-child { border-bottom:none; }
  .week-grid { overflow-x:auto; }
  .week-grid table { border-collapse:collapse; font-size:12px; }
  .week-grid th, .week-grid td { padding:3px 4px; text-align:center; white-space:nowrap; }
  .week-grid th { color:var(--muted); font-weight:700; font-size:10px; text-transform:uppercase; }
  .week-grid td:first-child, .week-grid th:first-child { text-align:left; color:var(--muted); padding-right:8px; }
  .week-grid .ex-field-input { width:40px; }

  /* CRIAÇÃO: botões grandes + modal de confirmação + wizard IA */
  .creation-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .creation-btn { display:flex; flex-direction:column; align-items:center; gap:8px; padding:18px 10px; border-radius:var(--radius-lg); font-family:var(--font); cursor:pointer; text-align:center; }
  .creation-btn svg { width:24px; height:24px; }
  .creation-btn .cb-title { font-size:14px; font-weight:800; }
  .creation-btn .cb-sub { font-size:11px; font-weight:500; opacity:.8; }
  .creation-btn.ia { background:linear-gradient(135deg,var(--primary),#1e4fb0); color:#fff; border:none; box-shadow:0 10px 24px -10px rgba(45,107,228,.5); }
  .creation-btn.manual { background:var(--card-grad); color:var(--text); border:1px solid rgba(20,30,45,.06); box-shadow:var(--shadow-card); }
  .creation-btn.manual svg { color:var(--muted); }

  .modal-overlay { position:fixed; inset:0; z-index:400; background:rgba(15,20,28,.55); display:none; align-items:center; justify-content:center; padding:24px; }
  .modal-overlay.show { display:flex; }
  .modal-card { width:100%; max-width:380px; background:var(--card-grad); border-radius:var(--radius-lg); padding:22px; box-shadow:0 20px 44px -14px rgba(20,30,45,.3); }
  .modal-card h3 { font-size:16px; font-weight:800; margin-bottom:6px; }
  .modal-card p { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:18px; }
  .modal-actions { display:flex; flex-direction:column; gap:8px; }

  .chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .chip { padding:8px 14px; border-radius:20px; border:1px solid var(--line); background:var(--bg); color:var(--muted); font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font); }
  .chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }

  .anamnese-context { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:14px; font-size:12.5px; line-height:1.6; color:var(--text); }
  .anamnese-context .ac-lbl { font-size:10px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .anamnese-context .ac-alert { color:var(--danger); font-weight:700; }
  .wizard-back { display:inline-block; margin-bottom:12px; color:var(--muted); font-size:13px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
  <header>
    <h1>Montar treino</h1>
    <a href="alunos.html" class="btn secondary small">‹ Alunos</a>
  </header>

  <div class="tabbar" id="studentTabbar">
    <a href="#" id="tabTreino" class="tab-link active">Treino</a>
    <a href="#" id="tabAvaliacao" class="tab-link">Avaliação</a>
    <a href="#" id="tabNutri" class="tab-link">Nutrição</a>
  </div>

  <main>
    <div class="card">
      <div class="field">
        <label>Aluno</label>
        <select id="studentSelect"><option value="">Selecione um aluno...</option></select>
      </div>
      <div id="protocolStatus" style="display:none;">
        <span class="status-tag" id="statusTag"></span>
      </div>
      <div id="duplicateArea" style="display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--line);">
        <div class="field" style="margin-bottom:8px;">
          <label>Duplicar protocolo de outro aluno</label>
          <select id="duplicateSourceSelect"></select>
        </div>
        <button class="btn secondary small" id="duplicateBtn" type="button">Duplicar pra este aluno</button>
      </div>
      <div id="templateArea" style="display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--line);">
        <div class="field" style="margin-bottom:8px;">
          <label>Aplicar modelo da biblioteca</label>
          <select id="templateSelect"><option value="">Nenhum modelo salvo ainda</option></select>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn secondary small" id="applyTemplateBtn" type="button">Aplicar modelo</button>
          <button class="btn secondary small" id="deleteTemplateBtn" type="button">Excluir modelo selecionado</button>
        </div>
      </div>
    </div>

    <div id="creationButtons" style="display:none;">
      <div class="creation-actions">
        <button class="creation-btn ia" id="newAiBtn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span class="cb-title">Criar novo com IA</span>
          <span class="cb-sub">Responde algumas perguntas, a IA monta tudo</span>
        </button>
        <button class="creation-btn manual" id="newManualBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          <span class="cb-title">Criar novo manual</span>
          <span class="cb-sub">Você monta tudo do zero</span>
        </button>
      </div>
    </div>

    <div id="aiWizardArea" style="display:none;">
      <div class="card">
        <span class="wizard-back" id="wizardBackBtn">‹ Voltar</span>
        <h2 style="margin-top:4px;">Criar treino com IA</h2>

        <div id="wizardAnamneseArea"></div>

        <div class="field">
          <label>Objetivo</label>
          <div class="chip-row" id="wizardObjetivo">
            <button type="button" class="chip active" data-value="hipertrofia">Hipertrofia</button>
            <button type="button" class="chip" data-value="emagrecimento">Emagrecimento</button>
            <button type="button" class="chip" data-value="saude">Saúde</button>
          </div>
        </div>

        <div class="field">
          <label>Nível do aluno</label>
          <div class="chip-row" id="wizardNivel">
            <button type="button" class="chip" data-value="iniciante">Iniciante</button>
            <button type="button" class="chip active" data-value="intermediario">Intermediário</button>
            <button type="button" class="chip" data-value="avancado">Avançado</button>
          </div>
        </div>

        <div class="periodization-row">
          <div class="field" style="margin-bottom:0;">
            <label>Periodização</label>
            <select id="wizardPeriodizacaoSelect">
              <option value="manual">Nenhuma (manual)</option>
              <option value="linear" selected>Linear</option>
              <option value="ondulatoria_diaria">Ondulatória diária</option>
              <option value="ondulatoria_semanal">Ondulatória semanal</option>
              <option value="blocos">Em blocos</option>
              <option value="reversa">Reversa</option>

          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Semanas</label>

        <div class="field">
          <label>Frequência semanal</label>

            <button type="button" class="chip" data-value="2">2x</button>
            <button type="button" class="chip" data-value="3">3x</button>
            <button type="button" class="chip active" data-value="4">4x</button>
            <button type="button" class="chip" data-value="5">5x</button>
            <button type="button" class="chip" data-value="6">6x</button>

        </div>

        <div class="field">
          <label>Duração da sessão</label>
          <div class="chip-row" id="wizardDuracaoSessao">
            <button type="button" class="chip" data-value="30">30 min</button>
            <button type="button" class="chip" data-value="45">45 min</button>
            <button type="button" class="chip active" data-value="60">60 min</button>
            <button type="button" class="chip" data-value="75">75 min</button>
          </div>
        </div>

        <div class="field">
          <label>Algo mais que a IA deveria saber? (opcional)</label>
          <textarea id="aiObjetivoInput" rows="2" style="width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); font-family:var(--font); resize:vertical;" placeholder="Ex: evitar supino, aluno prefere treino em casa com halteres..."></textarea>
        </div>

        <button class="btn" id="generateAiBtn" type="button"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" style="vertical-align:-2px;margin-right:5px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Criar treino perfeito</button>
        <div class="msg" id="aiMsg"></div>
      </div>
    </div>

    <div id="builderArea" style="display:none;">
      <div class="card">
        <div class="field">
          <label>Título do protocolo</label>
          <input type="text" id="tituloInput" placeholder="Ex: Ciclo 1 — Hipertrofia">
        </div>
        <div class="periodization-row">
          <div class="field" style="margin-bottom:0;">
            <label>Periodização</label>
            <select id="periodizacaoSelect">
              <option value="manual">Nenhuma (manual)</option>
              <option value="linear">Linear</option>
              <option value="ondulatoria_diaria">Ondulatória diária</option>
              <option value="ondulatoria_semanal">Ondulatória semanal</option>
              <option value="blocos">Em blocos</option>
              <option value="reversa">Reversa</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Duração (semanas)</label>

        <button class="btn secondary" id="applyPeriodizationBtn">Aplicar periodização aos exercícios</button>
        <button class="btn secondary" id="addWorkoutBtn" style="margin-left:8px;">+ Adicionar treino (A, B, C...)</button>
      </div>

      <div id="workoutsContainer"></div>

      <div class="card" style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn secondary" id="saveDraftBtn">Salvar rascunho</button>
        <button class="btn" id="publishBtn">Publicar para o aluno</button>
        <button class="btn secondary" id="saveAsTemplateBtn" type="button">Salvar como modelo</button>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal-card">
      <h3>Criar um treino novo?</h3>
      <p>Já existe um treino pra esse aluno. O que você quer fazer com ele antes de começar do zero?</p>
      <div class="modal-actions">
        <button class="btn secondary" id="confirmSaveTemplateBtn" type="button">Salvar o atual como modelo e continuar</button>
        <button class="btn" id="confirmContinueBtn" type="button">Continuar (o atual vira rascunho)</button>
        <button class="btn secondary" id="confirmCancelModalBtn" type="button">Cancelar</button>
      </div>
    </div>
  </div>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;
  let currentProtocol = null; // { id, student_id, titulo, status, periodizacao, duracao_semanas, workouts: [...] }
  let searchDebounce = null;
  let muscleGroups = [];
  let viewMode = 'edit'; // 'edit' | 'wizard'
  let pendingCreationAction = null; // 'manual' | 'ia'
  let currentAnamnese = null;

  const PERIODIZATION_HINTS = {
    manual: 'Sets/reps/descanso fixos, sem progressão automática — você ajusta na mão quando quiser.',
    linear: 'Volume cai e a intensidade sobe ao longo do ciclo; última semana é deload. Boa pra iniciantes e foco em força.',
    ondulatoria_diaria: 'Cada treino do loop (A, B, C...) recebe um perfil diferente — pesado, moderado, leve — em vez de progressão por semana.',
    ondulatoria_semanal: 'Alterna semana de força, hipertrofia e resistência em um ciclo de 3 semanas que se repete.',
    blocos: 'Divide o ciclo em 3 fases: acumulação (volume), intensificação e realização (pico).',
    reversa: 'O oposto da linear: volume sobe e a intensidade cai ao longo do ciclo.',
  };
  const PERIODIZATION_DEFAULT_WEEKS = {
    linear: 4, ondulatoria_semanal: 6, blocos: 9, reversa: 4,
  };

  const WEEKDAYS = [
    { key: 'dom', label: 'Dom' }, { key: 'seg', label: 'Seg' }, { key: 'ter', label: 'Ter' },
    { key: 'qua', label: 'Qua' }, { key: 'qui', label: 'Qui' }, { key: 'sex', label: 'Sex' }, { key: 'sab', label: 'Sáb' },
  ];

  function defaultWeek() {
    return { sets: 3, reps: '12', rest: 75, nota: '' };
  }

  function generateWeeks(technique, base, duration, workoutIndex) {
    const baseSets = Number(base.sets) || 3;
    const baseReps = parseInt(base.reps, 10) || 12;
    const baseRest = Number(base.rest) || 60;
    const reps = (n) => String(Math.max(3, Math.round(n)));

    if (technique === 'linear') {
      const weeks = [];
      for (let w = 0; w < duration; w++) {
        if (w === duration - 1 && duration > 1) {
          weeks.push({ sets: Math.max(2, baseSets - 1), reps: reps(baseReps + 2), rest: baseRest, nota: 'Deload' });
        } else {
          const t = duration > 2 ? w / (duration - 2) : 0;
          weeks.push({ sets: baseSets + (w >= Math.ceil((duration - 1) / 2) ? 1 : 0), reps: reps(baseReps - t * Math.max(0, baseReps - 5)), rest: baseRest + w * 10, nota: '' });
        }
      }
      return weeks;
    }
    if (technique === 'reversa') {
      const weeks = [];
      for (let w = 0; w < duration; w++) {
        const t = duration > 1 ? w / (duration - 1) : 0;
        weeks.push({ sets: Math.max(2, baseSets - Math.round(t)), reps: reps(baseReps - 3 + t * 8), rest: Math.max(20, baseRest - w * 10), nota: '' });
      }
      return weeks;
    }
    if (technique === 'ondulatoria_semanal') {
      const perfis = [
        { sets: baseSets + 1, reps: reps(baseReps - 4), rest: baseRest + 20, nota: 'Força' },
        { sets: baseSets, reps: reps(baseReps), rest: baseRest, nota: 'Hipertrofia' },
        { sets: Math.max(2, baseSets - 1), reps: reps(baseReps + 6), rest: Math.max(20, baseRest - 20), nota: 'Resistência' },
      ];
      return Array.from({ length: duration }, (_, w) => ({ ...perfis[w % 3] }));
    }
    if (technique === 'blocos') {
      const weeks = [];
      const third = Math.max(1, Math.round(duration / 3));
      for (let w = 0; w < duration; w++) {
        if (w < third) weeks.push({ sets: baseSets + 1, reps: reps(baseReps + 2), rest: baseRest, nota: 'Acumulação' });
        else if (w < third * 2) weeks.push({ sets: baseSets, reps: reps(baseReps), rest: baseRest + 15, nota: 'Intensificação' });
        else weeks.push({ sets: Math.max(2, baseSets - 1), reps: reps(Math.max(3, baseReps - 4)), rest: baseRest + 30, nota: 'Realização' });
      }
      return weeks;
    }
    if (technique === 'ondulatoria_diaria') {
      const perfis = [
        { sets: baseSets + 1, reps: reps(baseReps - 4), rest: baseRest + 20, nota: 'Pesado' },
        { sets: baseSets, reps: reps(baseReps), rest: baseRest, nota: 'Moderado' },
        { sets: Math.max(2, baseSets - 1), reps: reps(baseReps + 6), rest: Math.max(20, baseRest - 20), nota: 'Leve' },
      ];
      return [perfis[workoutIndex % 3]];
    }
    return [{ sets: baseSets, reps: String(baseReps), rest: baseRest, nota: '' }];
  }

  $('generateAiBtn').addEventListener('click', async () => {
    if (!currentProtocol.student_id) return;

    const objetivo = $('aiObjetivoInput').value.trim();
    const categoriaObjetivo = wizardChipValue('wizardObjetivo');
    const nivel = wizardChipValue('wizardNivel');
    const periodizacao = $('wizardPeriodizacaoSelect').value;
    const usesDuration = !['manual', 'ondulatoria_diaria'].includes(periodizacao);
    const duracaoSemanas = usesDuration ? Math.max(2, Number($('wizardDuracaoInput').value) || 4) : null;
    const frequencia = Number(wizardChipValue('wizardFrequencia')) || 4;
    const duracaoSessaoMin = Number(wizardChipValue('wizardDuracaoSessao')) || 60;

    $('generateAiBtn').disabled = true;
    $('generateAiBtn').textContent = 'Criando... (pode levar até 30s)';
    $('aiMsg').textContent = '';
    $('aiMsg').className = 'msg';

    const { data, error } = await supa.functions.invoke('generate-workout', {
      body: {
        student_id: currentProtocol.student_id,
        objetivo,
        categoria_objetivo: categoriaObjetivo,
        nivel,
        frequencia,
        duracao_sessao_min: duracaoSessaoMin,
      },
    });

    $('generateAiBtn').disabled = false;
    $('generateAiBtn').innerHTML = '<svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" style="vertical-align:-2px;margin-right:5px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Criar treino perfeito';

    if (error || !data || data.error) {
      let motivo = data?.error || error?.message || 'erro desconhecido';
      if (error?.context?.json) {
        try {
          const body = await error.context.json();
          if (body?.error) motivo = body.error;
        } catch {}
      }
      $('aiMsg').textContent = 'Erro ao gerar: ' + motivo;
      $('aiMsg').className = 'msg error';
      return;
    }

    const workouts = [];
    for (const w of (data.workouts || [])) {
      const exercises = [];
      for (const ex of (w.exercises || [])) {
        const match = await matchExerciseByName(ex.nome);
        const base = { sets: Number(ex.sets) || 3, reps: String(ex.reps || '12'), rest: Number(ex.rest) || 60, nota: '' };
        exercises.push({
          nome: match ? match.nome : ex.nome,
          exercise_id: match?.exercise_id,
          exercise_ref: match?.exercise_ref,
          media: match?.gif_url,
          mediaType: 'img',
          tecnica: ex.tecnica || null,
          note: ex.nota_execucao || '',
          weeks: [base],
        });
      }
      workouts.push({ _uid: uid(), id: w.id || String.fromCharCode(65 + workouts.length), name: w.name, exercises });
    }

    currentProtocol.titulo = data.titulo || currentProtocol.titulo;
    currentProtocol.periodizacao = periodizacao;
    currentProtocol.duracao_semanas = duracaoSemanas;
    currentProtocol.workouts = workouts;

    // Aplica a periodização escolhida em cima da base que a IA sugeriu —
    // a IA decide exercícios/técnica, o cálculo de progressão semana a
    // semana continua sendo o mesmo generateWeeks() determinístico do
    // modo manual (mais barato e confiável do que pedir aritmética pro modelo).
    const durationForWeeks = usesDuration ? duracaoSemanas : 1;
    currentProtocol.workouts.forEach((w, wIdx) => {
      w.exercises.forEach(ex => {
        const base = ex.weeks[0];
        ex.weeks = generateWeeks(periodizacao, base, durationForWeeks, wIdx);
      });
    });

    viewMode = 'edit';
    renderProtocol();
    showViewMode();
    toast('Treino criado pela IA — revise antes de publicar.');
  });

  async function matchExerciseByName(nome) {
    const { data } = await supa.rpc('search_exercise_library', { q: nome });
    return (data && data[0]) || null;
  }

  async function regenerateWorkoutExercises(workoutUid, btn) {
    const w = currentProtocol.workouts.find(x => x._uid === workoutUid);
    if (!w || !w.exercises.length) return;
    if (!confirm(`Trocar os exercícios de "${w.name}"? Sets, reps, descanso e periodização de cada um continuam como estão — só o exercício em si muda.`)) return;

    const originalLabel = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = 'Trocando...';

    const { data, error } = await supa.functions.invoke('regenerate-exercises', {
      body: {
        student_id: currentProtocol.student_id,
        exercises: w.exercises.map(ex => ({ exercise_id: ex.exercise_id || null, nome: ex.nome, tecnica: ex.tecnica || null })),
      },
    });

    btn.disabled = false;
    btn.innerHTML = originalLabel;

    if (error || !data || data.error || !Array.isArray(data.exercises)) {
      let motivo = data?.error || error?.message || 'erro desconhecido';
      if (error?.context?.json) {
        try { const body = await error.context.json(); if (body?.error) motivo = body.error; } catch {}
      }
      toast('Erro ao trocar exercícios: ' + motivo);
      return;
    }

    for (let i = 0; i < w.exercises.length; i++) {
      const novoNome = data.exercises[i]?.nome;
      if (!novoNome) continue;
      const match = await matchExerciseByName(novoNome);
      w.exercises[i].nome = match ? match.nome : novoNome;
      w.exercises[i].exercise_id = match?.exercise_id;
      w.exercises[i].exercise_ref = match?.exercise_ref;
      w.exercises[i].media = match?.gif_url;
    }
    renderWorkouts();
    toast(`Exercícios de "${w.name}" trocados.`);
  }

    const container = $('workoutsContainer');
    if (!currentProtocol.workouts.length) {
      container.innerHTML = '<div class="card"><div class="empty">Nenhum treino adicionado ainda.</div></div>';
      return;
    }
    container.innerHTML = currentProtocol.workouts.map(w => `
      <div class="workout-block" data-workout-id="${w._uid}">
        <div class="workout-block-header">
          <input type="text" value="${escapeHtml(w.name)}" data-role="workout-name" data-workout-id="${w._uid}">
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button class="btn secondary small" data-role="regenerate-exercises" data-workout-id="${w._uid}" type="button" title="Trocar exercícios, mantendo técnicas e periodização"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Trocar exercícios</button>
            <button class="btn danger small" data-role="remove-workout" data-workout-id="${w._uid}">Remover</button>
          </div>
        </div>
        <div class="weekday-picker" data-workout-id="${w._uid}">
          ${WEEKDAYS.map(d => `<button type="button" class="wd-btn ${(w.dias_semana || []).includes(d.key) ? 'active' : ''}" data-role="weekday-toggle" data-day="${d.key}" data-workout-id="${w._uid}">${d.label}</button>`).join('')}
        </div>
        <div class="exercises-list">
          ${w.exercises.length ? w.exercises.map((ex, i) => renderExerciseRow(w, ex, i)).join('') : '<div class="empty">Nenhum exercício ainda.</div>'}
        </div>
        <div class="search-box">
          <div class="row three" style="grid-template-columns:2fr 1fr;">
            <input type="text" placeholder="Buscar exercício por nome..." data-role="search-input" data-workout-id="${w._uid}" autocomplete="off">
            <select data-role="filter-grupo" data-workout-id="${w._uid}">
              <option value="">Todos os grupos</option>
              ${muscleGroups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('')}
            </select>
          </div>
          <div class="search-results" data-role="search-results" data-workout-id="${w._uid}" style="display:none;"></div>
        </div>
      </div>
    `).join('');

    container.querySelectorAll('[data-role="workout-name"]').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (w) w.name = e.target.value;
      });
    });
    container.querySelectorAll('[data-role="weekday-toggle"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (!w) return;
        w.dias_semana = w.dias_semana || [];
        const day = e.target.dataset.day;
        const idx = w.dias_semana.indexOf(day);
        if (idx >= 0) w.dias_semana.splice(idx, 1); else w.dias_semana.push(day);
        e.target.classList.toggle('active', idx < 0);
      });
    });
    container.querySelectorAll('[data-role="remove-workout"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        currentProtocol.workouts = currentProtocol.workouts.filter(x => x._uid !== e.target.dataset.workoutId);
        renderWorkouts();
      });
    });
    container.querySelectorAll('[data-role="regenerate-exercises"]').forEach(btn => {
      btn.addEventListener('click', () => regenerateWorkoutExercises(btn.dataset.workoutId, btn));
    });
    container.querySelectorAll('[data-role="remove-exercise"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (w) w.exercises.splice(Number(e.target.dataset.idx), 1);
        renderWorkouts();
      });
    });
    container.querySelectorAll('[data-role="wk-sets"], [data-role="wk-reps"], [data-role="wk-rest"]').forEach(inp => {
      inp.addEventListener('change', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (!w) return;
        const ex = w.exercises[Number(e.target.dataset.idx)];
        if (!ex) return;
        if (!ex.weeks || !ex.weeks.length) ex.weeks = [defaultWeek()];
        const wk = ex.weeks[Number(e.target.dataset.week)];
        if (!wk) return;
        if (e.target.dataset.role === 'wk-sets') wk.sets = Number(e.target.value) || 1;
        if (e.target.dataset.role === 'wk-reps') wk.reps = e.target.value;
        if (e.target.dataset.role === 'wk-rest') wk.rest = Number(e.target.value) || 0;
      });
    });
    container.querySelectorAll('[data-role="search-input"]').forEach(inp => {
      inp.addEventListener('input', (e) => {
        clearTimeout(searchDebounce);
        const workoutId = e.target.dataset.workoutId;
        const query = e.target.value.trim();
        const resultsBox = container.querySelector(`[data-role="search-results"][data-workout-id="${workoutId}"]`);
        if (query.length < 2) { resultsBox.style.display = 'none'; return; }
        const grupoFilter = container.querySelector(`[data-role="filter-grupo"][data-workout-id="${workoutId}"]`).value;
        searchDebounce = setTimeout(() => searchExercises(query, grupoFilter, workoutId, resultsBox), 300);
      });
    });
    container.querySelectorAll('[data-role="filter-grupo"]').forEach(sel => {
      sel.addEventListener('change', (e) => {
        const workoutId = e.target.dataset.workoutId;
        const searchInput = container.querySelector(`[data-role="search-input"][data-workout-id="${workoutId}"]`);
        const query = searchInput.value.trim();
        const resultsBox = container.querySelector(`[data-role="search-results"][data-workout-id="${workoutId}"]`);
        if (query.length < 2) return;
        searchExercises(query, e.target.value, workoutId, resultsBox);
      });
    });
  }

  async function searchExercises(query, grupoFilter, workoutId, resultsBox) {
    const { data, error } = await supa.rpc('search_exercise_library', { q: query });
    if (error) { console.error(error.message); return; }
    const filtered = grupoFilter ? (data || []).filter(ex => ex.grupo_muscular === grupoFilter) : (data || []);
    if (!filtered.length) {
      resultsBox.innerHTML = '<div class="search-result-item">Nenhum exercício encontrado.</div>';
      resultsBox.style.display = 'block';
      return;
    }
    resultsBox.innerHTML = filtered.map(ex => `
      <div class="search-result-item" data-exercise-id="${ex.exercise_id}">
        ${escapeHtml(ex.nome)}
        <div class="grupo">${escapeHtml(ex.grupo_muscular || '')}</div>
      </div>
    `).join('');
    resultsBox.style.display = 'block';

    resultsBox.querySelectorAll('.search-result-item[data-exercise-id]').forEach(item => {
      item.addEventListener('click', () => {
        const ex = filtered.find(x => String(x.exercise_id) === item.dataset.exerciseId);
        addExerciseToWorkout(workoutId, ex);
        resultsBox.style.display = 'none';
      });
    });
  }

  function addExerciseToWorkout(workoutId, ex) {
    const w = currentProtocol.workouts.find(x => x._uid === workoutId);
    if (!w) return;
    w.exercises.push({
      nome: ex.nome,
      exercise_id: ex.exercise_id,
      exercise_ref: ex.exercise_ref,
      media: ex.gif_url,
      mediaType: 'img',
      weeks: [defaultWeek()],
    });
    renderWorkouts();
  }

  $('addWorkoutBtn').addEventListener('click', () => {
    const letter = String.fromCharCode(65 + currentProtocol.workouts.length);
    currentProtocol.workouts.push({ _uid: uid(), id: letter, name: `Treino ${letter}`, exercises: [] });
    renderWorkouts();
  });

  function stripInternalFields(workouts) {
    return workouts.map(w => ({ id: w.id, name: w.name, exercises: w.exercises, dias_semana: w.dias_semana || [] }));
  }

  async function saveProtocol(status) {
    currentProtocol.titulo = $('tituloInput').value.trim() || 'Protocolo de treino';
    const payload = {
      professional_id: professional.id,
      student_id: currentProtocol.student_id,
      titulo: currentProtocol.titulo,
      status,
      periodizacao: currentProtocol.periodizacao || 'manual',
      duracao_semanas: currentProtocol.duracao_semanas || null,
      workouts: stripInternalFields(currentProtocol.workouts),
      publicado_em: status === 'publicado' ? new Date().toISOString() : currentProtocol.publicado_em || null,
    };

    let result;
    if (currentProtocol.id) {
      result = await supa.from('training_protocols').update(payload).eq('id', currentProtocol.id).select().single();
    } else {
      result = await supa.from('training_protocols').insert(payload).select().single();
    }

    if (result.error) {
      console.error(result.error.message);
      toast('Erro ao salvar: ' + result.error.message);
      return;
    }
    currentProtocol.id = result.data.id;
    currentProtocol.status = result.data.status;
    renderProtocol();
    toast(status === 'publicado' ? 'Protocolo publicado para o aluno.' : 'Rascunho salvo.');
  }

  $('saveDraftBtn').addEventListener('click', () => saveProtocol('rascunho'));
  $('publishBtn').addEventListener('click', () => saveProtocol('publicado'));

  boot();
</script>
</body>
</html>
