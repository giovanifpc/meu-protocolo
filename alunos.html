<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://drive.google.com https://*.supabase.co; connect-src 'self' https://yumqmramxbahkfxsthtt.supabase.co wss://yumqmramxbahkfxsthtt.supabase.co https://o4511757250199552.ingest.us.sentry.io; object-src 'none'; base-uri 'self';">

<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch((e) => console.error('Falha ao registrar service worker:', e));</script>
<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#1E8C64; --accent-dim:#146B4D; --text:#1E2A3A;
    --line:#E9EBEF; --card:#FFFFFF; --muted:#63707F; --faint:#94A0AF; --danger:#C0392B; --font:'Inter', sans-serif;
    --radius:14px; --radius-lg:18px;
    --card-grad:linear-gradient(165deg,#FFFFFF 0%,#F7FBF9 55%,#F6F8FE 100%);
    --shadow-card:0 1px 2px rgba(20,30,45,.04), 0 10px 24px -14px rgba(20,30,45,.14);
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); }
  header h1 { font-size:18px; font-weight:700; margin:0; }
  main { max-width:720px; margin:0 auto; padding:20px 20px 90px; }
  .card { background:var(--card-grad); border:1px solid rgba(20,30,45,.04); box-shadow:var(--shadow-card); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .student-item { border-bottom:1px solid var(--line); padding:10px 0; }
  .student-item:last-child { border-bottom:none; }
  .student-row { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
  .student-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .student-name-row { display:flex; align-items:center; gap:8px; }
  .student-name { font-weight:600; font-size:14px; }
  .student-email { font-size:12px; color:var(--muted); }
  .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .status-dot.ativo { background:var(--accent); }
  .status-dot.pausado { background:#D9A441; }
  .status-dot.inativo { background:var(--muted); }
  .notes-panel { display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
  .notes-panel.open { display:block; }
  .notes-panel select, .notes-panel textarea, .notes-panel input { width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:13px; color:var(--text); font-family:var(--font); margin-bottom:8px; }
  .notes-panel textarea { min-height:70px; resize:vertical; }
  .notes-sub-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:10px 0 6px; }
  .notes-sub-label:first-child { margin-top:0; }
  .avatar-preview { width:56px; height:56px; border-radius:50%; background:var(--primary); color:#fff; font-size:20px; font-weight:800; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:12px; }
  .avatar-preview img { width:100%; height:100%; object-fit:cover; display:block; }
  .billing-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .billing-row > * { min-width:0; }
  .billing-status { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .field input { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); font-family:var(--font); }
  .field input:focus { outline:none; border-color:var(--primary); }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); text-decoration:none; display:inline-block; transition:transform .15s ease; }
  .btn:active { transform:scale(.97); }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-icon { display:inline-flex; align-items:center; justify-content:center; }
  .btn-icon svg { width:15px; height:15px; }
  .msg { font-size:13px; margin-top:8px; }
  .msg.error { color:var(--danger); }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:720px; margin:0 auto; height:64px; background:var(--card); border-top:1px solid var(--line); display:flex; z-index:60; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--faint); text-decoration:none; font-family:var(--font); padding-top:6px; }
  .nav-btn .nav-ico { width:22px; height:22px; line-height:1; position:relative; }
  .nav-dot { position:absolute; top:-2px; right:-4px; width:8px; height:8px; border-radius:50%; background:var(--danger); border:2px solid var(--card); display:none; }
  .nav-btn .nav-ico svg { width:100%; height:100%; display:block; }
  .nav-btn .nav-lbl { font-size:10px; font-weight:700; }
  .nav-btn.active { color:var(--primary); }
</style>
</head>
<body>
  <header>
    <h1>Alunos</h1>
    <button class="btn secondary" id="logoutBtn">Sair</button>
  </header>

  <main>
    <div class="card">
      <h2>Adicionar aluno</h2>
      <div class="field">
        <label>Nome</label>
        <input type="text" id="newStudentName" placeholder="Nome do aluno">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="newStudentEmail" placeholder="aluno@email.com">
      </div>
      <button class="btn" id="addStudentBtn">Adicionar aluno</button>
      <div class="msg error" id="addStudentMsg"></div>
    </div>

    <div class="card">
      <h2>Meus alunos</h2>
      <div id="studentsList"><div class="empty">Carregando...</div></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-btn" href="index.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg></span><span class="nav-lbl">Início</span></a>
    <a class="nav-btn active" href="alunos.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span class="nav-lbl">Alunos</span></a>
    <a class="nav-btn" href="mensagens.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nav-dot" id="navMsgDot"></span></span><span class="nav-lbl">Mensagens</span></a>
    <a class="nav-btn" href="relatorios.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg></span><span class="nav-lbl">Relatórios</span></a>
    <a class="nav-btn" href="perfil.html"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.7.36 1.15 1.03 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span class="nav-lbl">Config</span></a>
  </nav>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function boot() {
    const { data: { session } } = await supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: pro, error } = await supa.from('professionals').select('*').eq('email', session.user.email).maybeSingle();
    if (error) { console.error('Falha ao carregar professional:', error.message); return; }
    if (!pro) { window.location.href = 'onboarding.html'; return; }

    professional = pro;
    supa.rpc('get_professional_unread_message_count').then(({ data }) => {
      $('navMsgDot').style.display = (data || 0) > 0 ? 'block' : 'none';
    });
    await loadStudents();
  }

  async function loadStudentAvatarPreview(studentId) {
    const el = $('avatarPreview-' + studentId);
    if (!el) return;
    const { data, error } = await supa.storage.from('student-avatars').createSignedUrl(`${studentId}/avatar.jpg`, 3600);
    if (error || !data) return;
    el.innerHTML = `<img src="${data.signedUrl}" alt="">`;
  }

  const STATUS_LABELS = { ativo: 'Ativo', pausado: 'Pausado', inativo: 'Inativo' };
  const PLAN_STUDENT_LIMITS = { starter: 15, pro: 40, elite: Infinity };
  let notesByStudent = {};
  let currentStudentCount = 0;

  async function loadStudents() {
    const { data, error } = await supa.from('students').select('*').eq('professional_id', professional.id).order('created_at', { ascending: false });
    const list = $('studentsList');
    if (error) { list.innerHTML = `<div class="empty">Erro ao carregar alunos.</div>`; return; }
    currentStudentCount = data ? data.length : 0;
    if (!data || data.length === 0) { list.innerHTML = `<div class="empty">Nenhum aluno cadastrado ainda.</div>`; return; }

    const { data: notes } = await supa.from('student_notes').select('*').eq('professional_id', professional.id);
    notesByStudent = {};
    (notes || []).forEach(n => { notesByStudent[n.student_id] = n; });

    list.innerHTML = data.map(s => {
      const note = notesByStudent[s.id] || { status: 'ativo', nota: '' };
      return `
      <div class="student-item">
        <div class="student-row">
          <div class="student-name-row">
            <span class="status-dot ${note.status}" title="${STATUS_LABELS[note.status]}"></span>
            <div>
              <div class="student-name">${escapeHtml(s.nome)}</div>
              <div class="student-email">${escapeHtml(s.email)}</div>
            </div>
          </div>
          <div class="student-actions">
            <a class="btn secondary" style="padding:7px 12px;font-size:12px;" href="treinos.html?student_id=${s.id}">Treino</a>
            <a class="btn secondary" style="padding:7px 12px;font-size:12px;" href="avaliacoes.html?student_id=${s.id}">Avaliação</a>
            <a class="btn secondary" style="padding:7px 12px;font-size:12px;" href="nutri.html?student_id=${s.id}">Nutri</a>
            <button class="btn secondary btn-icon" style="padding:7px 10px;" data-role="toggle-msg" data-student-id="${s.id}" title="Enviar mensagem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
            <button class="btn secondary btn-icon" style="padding:7px 10px;" data-role="toggle-notes" data-student-id="${s.id}" title="Nota privada e status"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
          </div>
        </div>
        <div class="notes-panel" id="msgPanel-${s.id}">
          <div class="notes-sub-label">Enviar mensagem</div>
          <textarea data-role="msg-text" data-student-id="${s.id}" placeholder="Escreva uma mensagem para ${escapeHtml(s.nome)}..."></textarea>
          <button class="btn small" style="padding:7px 12px;font-size:12px;" data-role="send-msg" data-student-id="${s.id}">Enviar</button>
          <div class="msg" id="msgSendStatus-${s.id}"></div>
        </div>
        <div class="notes-panel" id="notesPanel-${s.id}">
          <div class="avatar-preview" id="avatarPreview-${s.id}">${escapeHtml((s.nome || '?').trim().charAt(0).toUpperCase())}</div>
          <div class="notes-sub-label">Status e nota privada</div>
          <select data-role="note-status" data-student-id="${s.id}">
            ${Object.entries(STATUS_LABELS).map(([v, l]) => `<option value="${v}" ${note.status === v ? 'selected' : ''}>${l}</option>`).join('')}
          </select>
          <textarea data-role="note-text" data-student-id="${s.id}" placeholder="Nota privada sobre esse aluno (só você vê)...">${escapeHtml(note.nota || '')}</textarea>
          <button class="btn small" style="padding:7px 12px;font-size:12px;" data-role="save-note" data-student-id="${s.id}">Salvar nota</button>

          <div class="notes-sub-label">WhatsApp e mensalidade</div>
          <input type="tel" data-role="telefone" data-student-id="${s.id}" placeholder="WhatsApp com DDD e país, ex: 5511999999999" value="${escapeHtml(s.telefone || '')}">
          <div class="billing-row">
            <input type="number" step="0.01" data-role="mensalidade-valor" data-student-id="${s.id}" placeholder="Valor (R$)" value="${s.mensalidade_valor ?? ''}">
            <input type="number" min="1" max="31" data-role="mensalidade-dia" data-student-id="${s.id}" placeholder="Dia venc. (1-31)" value="${s.mensalidade_dia_vencimento ?? ''}">
          </div>
          <div class="billing-status">${s.ultimo_pagamento_em ? `Último pagamento: ${new Date(s.ultimo_pagamento_em + 'T00:00:00').toLocaleDateString('pt-BR')}` : 'Nenhum pagamento registrado ainda'}</div>
          <button class="btn small secondary" style="padding:7px 12px;font-size:12px;margin-right:6px;" data-role="save-billing" data-student-id="${s.id}">Salvar WhatsApp/mensalidade</button>
          <button class="btn small secondary" style="padding:7px 12px;font-size:12px;" data-role="mark-paid" data-student-id="${s.id}">Marcar pago hoje</button>
        </div>
      </div>
    `; }).join('');

    const avatarLoaded = {};
    list.querySelectorAll('[data-role="toggle-msg"]').forEach(btn => {
      btn.addEventListener('click', () => {
        $('msgPanel-' + btn.dataset.studentId).classList.toggle('open');
      });
    });
    list.querySelectorAll('[data-role="send-msg"]').forEach(btn => {
      btn.addEventListener('click', () => sendMessageToStudent(btn.dataset.studentId));
    });
    list.querySelectorAll('[data-role="toggle-notes"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const studentId = btn.dataset.studentId;
        const panel = $('notesPanel-' + studentId);
        const opening = !panel.classList.contains('open');
        panel.classList.toggle('open');
        if (opening && !avatarLoaded[studentId]) {
          avatarLoaded[studentId] = true;
          loadStudentAvatarPreview(studentId);
        }
      });
    });
    list.querySelectorAll('[data-role="save-note"]').forEach(btn => {
      btn.addEventListener('click', () => saveNote(btn.dataset.studentId));
    });
    list.querySelectorAll('[data-role="save-billing"]').forEach(btn => {
      btn.addEventListener('click', () => saveBilling(btn.dataset.studentId));
    });
    list.querySelectorAll('[data-role="mark-paid"]').forEach(btn => {
      btn.addEventListener('click', () => markPaid(btn.dataset.studentId));
    });
  }

  async function sendMessageToStudent(studentId) {
    const textarea = document.querySelector(`[data-role="msg-text"][data-student-id="${studentId}"]`);
    const body = textarea.value.trim();
    const statusEl = $('msgSendStatus-' + studentId);
    if (!body) return;

    const btn = document.querySelector(`[data-role="send-msg"][data-student-id="${studentId}"]`);
    btn.disabled = true;
    statusEl.textContent = '';
    statusEl.className = 'msg';
    const { error } = await supa.rpc('send_message', { p_student_id: studentId, p_body: body });
    btn.disabled = false;

    if (error) {
      statusEl.textContent = 'Erro ao enviar: ' + error.message;
      statusEl.className = 'msg error';
      return;
    }
    textarea.value = '';
    statusEl.textContent = 'Mensagem enviada — veja a resposta na aba Mensagens.';
    toast('Mensagem enviada.');
  }

  async function saveBilling(studentId) {
    const telefone = document.querySelector(`[data-role="telefone"][data-student-id="${studentId}"]`).value.replace(/\D/g, '');
    const valorRaw = document.querySelector(`[data-role="mensalidade-valor"][data-student-id="${studentId}"]`).value;
    const diaRaw = document.querySelector(`[data-role="mensalidade-dia"][data-student-id="${studentId}"]`).value;

    const payload = {
      telefone: telefone || null,
      mensalidade_valor: valorRaw ? parseFloat(valorRaw) : null,
      mensalidade_dia_vencimento: diaRaw ? parseInt(diaRaw, 10) : null,
    };
    const { error } = await supa.from('students').update(payload).eq('id', studentId);
    if (error) { toast('Erro ao salvar: ' + error.message); return; }
    toast('WhatsApp/mensalidade salvos.');
    await loadStudents();
  }

  async function markPaid(studentId) {
    const { error } = await supa.from('students').update({ ultimo_pagamento_em: todayISO() }).eq('id', studentId);
    if (error) { toast('Erro ao marcar pagamento: ' + error.message); return; }
    toast('Pagamento registrado.');
    await loadStudents();
  }

  function todayISO() { return new Date().toISOString().slice(0, 10); }

  async function saveNote(studentId) {
    const status = document.querySelector(`[data-role="note-status"][data-student-id="${studentId}"]`).value;
    const nota = document.querySelector(`[data-role="note-text"][data-student-id="${studentId}"]`).value.trim();
    const existing = notesByStudent[studentId];

    const payload = { professional_id: professional.id, student_id: studentId, status, nota };
    const result = existing
      ? await supa.from('student_notes').update(payload).eq('id', existing.id)
      : await supa.from('student_notes').insert(payload);

    if (result.error) { toast('Erro ao salvar: ' + result.error.message); return; }
    toast('Nota salva.');
    await loadStudents();
  }

  $('addStudentBtn').addEventListener('click', async () => {
    const nome = $('newStudentName').value.trim();
    const email = $('newStudentEmail').value.trim().toLowerCase();
    $('addStudentMsg').textContent = '';
    if (!nome || !email || !email.includes('@')) {
      $('addStudentMsg').textContent = 'Preencha nome e e-mail válidos.';
      return;
    }
    const limite = PLAN_STUDENT_LIMITS[professional.plan] ?? PLAN_STUDENT_LIMITS.starter;
    if (currentStudentCount >= limite) {
      $('addStudentMsg').innerHTML = `Seu plano (${escapeHtml(professional.plan)}) permite até ${limite} alunos. <a href="perfil.html#planCard" style="color:var(--primary);font-weight:700;">Fazer upgrade</a>`;
      return;
    }
    $('addStudentBtn').disabled = true;
    const { error } = await supa.from('students').insert({ professional_id: professional.id, nome, email });
    $('addStudentBtn').disabled = false;
    if (error) {
      $('addStudentMsg').textContent = 'Erro: ' + error.message;
      return;
    }
    $('newStudentName').value = '';
    $('newStudentEmail').value = '';
    toast('Aluno adicionado.');
    await loadStudents();
    window.__checkAssistantHint && window.__checkAssistantHint();
  });

  $('logoutBtn').addEventListener('click', async () => {
    await supa.auth.signOut();
    window.location.href = 'login.html';
  });

  boot();
</script>
</body>
</html>
