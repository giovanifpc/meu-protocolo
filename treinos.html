<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Meu Protocolo — Montar treino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#3BB08F; --text:#1E2A3A;
    --line:#E2E5EA; --card:#FFFFFF; --muted:#6B7684; --danger:#C0392B; --font:'Inter', sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); gap:12px; }
  header h1 { font-size:17px; font-weight:700; margin:0; }
  main { max-width:720px; margin:0 auto; padding:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .field input, .field select { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); font-family:var(--font); }
  .field input:focus, .field select:focus { outline:none; border-color:var(--primary); }
  .row.three { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .btn.danger { background:#FDEDEC; color:var(--danger); border:1px solid #F5C6C0; }
  .btn.small { padding:6px 10px; font-size:12px; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .workout-block { border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
  .workout-block-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .workout-block-header input { font-weight:700; font-size:14px; border:none; background:transparent; padding:4px 0; flex:1; }
  .workout-block-header input:focus { outline:none; border-bottom:1px solid var(--primary); }
  .exercise-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .exercise-row:last-child { border-bottom:none; }
  .exercise-row .ex-meta { color:var(--muted); font-size:12px; }
  .exercise-row-edit { flex-wrap:wrap; }
  .ex-name-col { font-weight:600; flex:1 1 100%; margin-bottom:4px; }
  .ex-fields { display:flex; align-items:center; gap:4px; }
  .ex-field-input { width:44px; padding:5px 4px; text-align:center; border:1px solid var(--line); border-radius:6px; font-size:12px; font-family:var(--font); }
  .ex-field-input:focus { outline:none; border-color:var(--primary); }
  .ex-field-rest { width:52px; }
  .ex-field-x, .ex-field-unit { color:var(--muted); font-size:12px; }
  .search-box { position:relative; margin-top:8px; }
  .search-results { position:absolute; z-index:20; top:100%; left:0; right:0; background:var(--card); border:1px solid var(--line); border-radius:10px; margin-top:4px; max-height:240px; overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,.08); }
  .search-result-item { padding:9px 12px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--line); }
  .search-result-item:last-child { border-bottom:none; }
  .search-result-item:hover { background:var(--bg); }
  .search-result-item .grupo { color:var(--muted); font-size:11px; }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:16px 0; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
  .status-tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; text-transform:uppercase; }
  .status-tag.rascunho { background:#FFF4E5; color:#8A5A00; }
  .status-tag.publicado { background:#E7F7F1; color:#1B7A55; }
  .periodization-row { display:grid; grid-template-columns:2fr 1fr; gap:8px; margin-bottom:10px; }
  .periodization-hint { font-size:12px; color:var(--muted); margin:-4px 0 12px; line-height:1.5; }
  .ex-name-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
  .exercise-row-multi { padding:10px 0; border-bottom:1px solid var(--line); }
  .exercise-row-multi:last-child { border-bottom:none; }
  .week-grid { overflow-x:auto; }
  .week-grid table { border-collapse:collapse; font-size:12px; }
  .week-grid th, .week-grid td { padding:3px 4px; text-align:center; white-space:nowrap; }
  .week-grid th { color:var(--muted); font-weight:700; font-size:10px; text-transform:uppercase; }
  .week-grid td:first-child, .week-grid th:first-child { text-align:left; color:var(--muted); padding-right:8px; }
  .week-grid .ex-field-input { width:40px; }
</style>
</head>
<body>
  <header>
    <h1>Montar treino</h1>
    <a href="alunos.html" class="btn secondary small">‹ Alunos</a>
  </header>

  <main>
    <div class="card">
      <div class="field">
        <label>Aluno</label>
        <select id="studentSelect"><option value="">Selecione um aluno...</option></select>
      </div>
      <div id="protocolStatus" style="display:none;">
        <span class="status-tag" id="statusTag"></span>
      </div>
    </div>

    <div id="builderArea" style="display:none;">
      <div class="card">
        <div class="field">
          <label>Título do protocolo</label>
          <input type="text" id="tituloInput" placeholder="Ex: Ciclo 1 — Hipertrofia">
        </div>
        <div class="periodization-row">
          <div class="field" style="margin-bottom:0;">
            <label>Periodização</label>
            <select id="periodizacaoSelect">
              <option value="manual">Nenhuma (manual)</option>
              <option value="linear">Linear</option>
              <option value="ondulatoria_diaria">Ondulatória diária</option>
              <option value="ondulatoria_semanal">Ondulatória semanal</option>
              <option value="blocos">Em blocos</option>
              <option value="reversa">Reversa</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Duração (semanas)</label>
            <input type="number" id="duracaoInput" min="2" max="16" value="4">
          </div>
        </div>
        <div class="periodization-hint" id="periodizationHint"></div>
        <button class="btn secondary" id="applyPeriodizationBtn">Aplicar periodização aos exercícios</button>
        <button class="btn secondary" id="addWorkoutBtn" style="margin-left:8px;">+ Adicionar treino (A, B, C...)</button>
      </div>

      <div id="workoutsContainer"></div>

      <div class="card" style="display:flex; gap:10px;">
        <button class="btn secondary" id="saveDraftBtn">Salvar rascunho</button>
        <button class="btn" id="publishBtn">Publicar para o aluno</button>
      </div>
    </div>
  </main>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;
  let currentProtocol = null; // { id, student_id, titulo, status, periodizacao, duracao_semanas, workouts: [...] }
  let searchDebounce = null;
  let muscleGroups = [];

  const PERIODIZATION_HINTS = {
    manual: 'Sets/reps/descanso fixos, sem progressão automática — você ajusta na mão quando quiser.',
    linear: 'Volume cai e a intensidade sobe ao longo do ciclo; última semana é deload. Boa pra iniciantes e foco em força.',
    ondulatoria_diaria: 'Cada treino do loop (A, B, C...) recebe um perfil diferente — pesado, moderado, leve — em vez de progressão por semana.',
    ondulatoria_semanal: 'Alterna semana de força, hipertrofia e resistência em um ciclo de 3 semanas que se repete.',
    blocos: 'Divide o ciclo em 3 fases: acumulação (volume), intensificação e realização (pico).',
    reversa: 'O oposto da linear: volume sobe e a intensidade cai ao longo do ciclo.',
  };
  const PERIODIZATION_DEFAULT_WEEKS = {
    linear: 4, ondulatoria_semanal: 6, blocos: 9, reversa: 4,
  };

  function defaultWeek() {
    return { sets: 3, reps: '12', rest: 75, nota: '' };
  }

  function generateWeeks(technique, base, duration, workoutIndex) {
    const baseSets = Number(base.sets) || 3;
    const baseReps = parseInt(base.reps, 10) || 12;
    const baseRest = Number(base.rest) || 60;
    const reps = (n) => String(Math.max(3, Math.round(n)));

    if (technique === 'linear') {
      const weeks = [];
      for (let w = 0; w < duration; w++) {
        if (w === duration - 1 && duration > 1) {
          weeks.push({ sets: Math.max(2, baseSets - 1), reps: reps(baseReps + 2), rest: baseRest, nota: 'Deload' });
        } else {
          const t = duration > 2 ? w / (duration - 2) : 0;
          weeks.push({ sets: baseSets + (w >= Math.ceil((duration - 1) / 2) ? 1 : 0), reps: reps(baseReps - t * Math.max(0, baseReps - 5)), rest: baseRest + w * 10, nota: '' });
        }
      }
      return weeks;
    }
    if (technique === 'reversa') {
      const weeks = [];
      for (let w = 0; w < duration; w++) {
        const t = duration > 1 ? w / (duration - 1) : 0;
        weeks.push({ sets: Math.max(2, baseSets - Math.round(t)), reps: reps(baseReps - 3 + t * 8), rest: Math.max(20, baseRest - w * 10), nota: '' });
      }
      return weeks;
    }
    if (technique === 'ondulatoria_semanal') {
      const perfis = [
        { sets: baseSets + 1, reps: reps(baseReps - 4), rest: baseRest + 20, nota: 'Força' },
        { sets: baseSets, reps: reps(baseReps), rest: baseRest, nota: 'Hipertrofia' },
        { sets: Math.max(2, baseSets - 1), reps: reps(baseReps + 6), rest: Math.max(20, baseRest - 20), nota: 'Resistência' },
      ];
      return Array.from({ length: duration }, (_, w) => ({ ...perfis[w % 3] }));
    }
    if (technique === 'blocos') {
      const weeks = [];
      const third = Math.max(1, Math.round(duration / 3));
      for (let w = 0; w < duration; w++) {
        if (w < third) weeks.push({ sets: baseSets + 1, reps: reps(baseReps + 2), rest: baseRest, nota: 'Acumulação' });
        else if (w < third * 2) weeks.push({ sets: baseSets, reps: reps(baseReps), rest: baseRest + 15, nota: 'Intensificação' });
        else weeks.push({ sets: Math.max(2, baseSets - 1), reps: reps(Math.max(3, baseReps - 4)), rest: baseRest + 30, nota: 'Realização' });
      }
      return weeks;
    }
    if (technique === 'ondulatoria_diaria') {
      const perfis = [
        { sets: baseSets + 1, reps: reps(baseReps - 4), rest: baseRest + 20, nota: 'Pesado' },
        { sets: baseSets, reps: reps(baseReps), rest: baseRest, nota: 'Moderado' },
        { sets: Math.max(2, baseSets - 1), reps: reps(baseReps + 6), rest: Math.max(20, baseRest - 20), nota: 'Leve' },
      ];
      return [perfis[workoutIndex % 3]];
    }
    return [{ sets: baseSets, reps: String(baseReps), rest: baseRest, nota: '' }];
  }

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function uid() {
    return 'w' + Math.random().toString(36).slice(2, 9);
  }

  async function boot() {
    const { data: { session } } = await supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: pro, error } = await supa.from('professionals').select('*').eq('email', session.user.email).maybeSingle();
    if (error) { console.error(error.message); return; }
    if (!pro) { window.location.href = 'onboarding.html'; return; }
    professional = pro;

    await loadStudents();
    await loadMuscleGroups();

    const params = new URLSearchParams(window.location.search);
    const preselect = params.get('student_id');
    if (preselect) {
      $('studentSelect').value = preselect;
      await loadOrCreateProtocol(preselect);
    }
  }

  async function loadStudents() {
    const { data, error } = await supa.from('students').select('*').eq('professional_id', professional.id).order('nome');
    const select = $('studentSelect');
    if (error || !data) return;
    data.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.nome;
      select.appendChild(opt);
    });
  }

  async function loadMuscleGroups() {
    const { data, error } = await supa.from('exercise_library').select('grupo_muscular');
    if (error || !data) return;
    muscleGroups = [...new Set(data.map(r => r.grupo_muscular).filter(Boolean))].sort();
  }

  $('studentSelect').addEventListener('change', async (e) => {
    const studentId = e.target.value;
    if (!studentId) { $('builderArea').style.display = 'none'; return; }
    await loadOrCreateProtocol(studentId);
  });

  async function loadOrCreateProtocol(studentId) {
    const { data, error } = await supa
      .from('training_protocols')
      .select('*')
      .eq('student_id', studentId)
      .order('created_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    if (error) { console.error(error.message); toast('Erro ao carregar protocolo.'); return; }

    if (data) {
      currentProtocol = data;
      currentProtocol.workouts = (data.workouts || []).map(w => ({ ...w, _uid: uid() }));
    } else {
      currentProtocol = { id: null, student_id: studentId, titulo: 'Protocolo de treino', status: 'rascunho', periodizacao: 'manual', duracao_semanas: null, workouts: [] };
    }
    renderProtocol();
    $('builderArea').style.display = 'block';
  }

  function renderProtocol() {
    $('tituloInput').value = currentProtocol.titulo || '';
    $('protocolStatus').style.display = currentProtocol.id ? 'block' : 'none';
    if (currentProtocol.id) {
      $('statusTag').textContent = currentProtocol.status;
      $('statusTag').className = 'status-tag ' + currentProtocol.status;
    }
    $('periodizacaoSelect').value = currentProtocol.periodizacao || 'manual';
    $('duracaoInput').value = currentProtocol.duracao_semanas || PERIODIZATION_DEFAULT_WEEKS[currentProtocol.periodizacao] || 4;
    updatePeriodizationUI();
    renderWorkouts();
  }

  function updatePeriodizationUI() {
    const technique = $('periodizacaoSelect').value;
    $('periodizationHint').textContent = PERIODIZATION_HINTS[technique] || '';
    const usesDuration = !['manual', 'ondulatoria_diaria'].includes(technique);
    $('duracaoInput').disabled = !usesDuration;
    $('duracaoInput').parentElement.style.opacity = usesDuration ? '1' : '.5';
  }

  $('periodizacaoSelect').addEventListener('change', () => {
    const technique = $('periodizacaoSelect').value;
    if (PERIODIZATION_DEFAULT_WEEKS[technique]) $('duracaoInput').value = PERIODIZATION_DEFAULT_WEEKS[technique];
    updatePeriodizationUI();
  });

  $('applyPeriodizationBtn').addEventListener('click', () => {
    if (!currentProtocol.workouts.length) { toast('Adicione treinos e exercícios antes de aplicar a periodização.'); return; }
    const technique = $('periodizacaoSelect').value;
    const usesDuration = !['manual', 'ondulatoria_diaria'].includes(technique);
    const duration = usesDuration ? Math.max(2, Number($('duracaoInput').value) || 4) : 1;
    currentProtocol.periodizacao = technique;
    currentProtocol.duracao_semanas = usesDuration ? duration : null;
    currentProtocol.workouts.forEach((w, wIdx) => {
      w.exercises.forEach(ex => {
        const base = (ex.weeks && ex.weeks[0]) || defaultWeek();
        ex.weeks = generateWeeks(technique, base, duration, wIdx);
      });
    });
    renderWorkouts();
    toast('Periodização aplicada — confira e ajuste as semanas se quiser.');
  });

  function renderExerciseRow(w, ex, i) {
    const weeks = ex.weeks && ex.weeks.length ? ex.weeks : [{ sets: ex.sets || 3, reps: ex.reps || '12', rest: ex.rest || 60, nota: '' }];
    if (weeks.length <= 1) {
      const wk = weeks[0];
      return `
        <div class="exercise-row exercise-row-edit">
          <div class="ex-name-col">${escapeHtml(ex.nome)}</div>
          <div class="ex-fields">
            <input type="number" min="1" class="ex-field-input" value="${escapeHtml(wk.sets)}" data-role="wk-sets" data-workout-id="${w._uid}" data-idx="${i}" data-week="0" title="Séries">
            <span class="ex-field-x">×</span>
            <input type="text" class="ex-field-input" value="${escapeHtml(wk.reps)}" data-role="wk-reps" data-workout-id="${w._uid}" data-idx="${i}" data-week="0" title="Repetições">
            <input type="number" min="0" step="5" class="ex-field-input ex-field-rest" value="${escapeHtml(wk.rest)}" data-role="wk-rest" data-workout-id="${w._uid}" data-idx="${i}" data-week="0" title="Descanso (segundos)">
            <span class="ex-field-unit">s</span>
          </div>
          <button class="btn danger small" data-role="remove-exercise" data-workout-id="${w._uid}" data-idx="${i}">×</button>
        </div>`;
    }
    return `
      <div class="exercise-row-multi">
        <div class="ex-name-row">
          <div class="ex-name-col">${escapeHtml(ex.nome)}</div>
          <button class="btn danger small" data-role="remove-exercise" data-workout-id="${w._uid}" data-idx="${i}">×</button>
        </div>
        <div class="week-grid">
          <table>
            <thead><tr><th></th>${weeks.map((wk, wi) => `<th>${wk.nota ? escapeHtml(wk.nota) : 'S' + (wi + 1)}</th>`).join('')}</tr></thead>
            <tbody>
              <tr><td>Séries</td>${weeks.map((wk, wi) => `<td><input type="number" min="1" class="ex-field-input" value="${escapeHtml(wk.sets)}" data-role="wk-sets" data-workout-id="${w._uid}" data-idx="${i}" data-week="${wi}"></td>`).join('')}</tr>
              <tr><td>Reps</td>${weeks.map((wk, wi) => `<td><input type="text" class="ex-field-input" value="${escapeHtml(wk.reps)}" data-role="wk-reps" data-workout-id="${w._uid}" data-idx="${i}" data-week="${wi}"></td>`).join('')}</tr>
              <tr><td>Desc.(s)</td>${weeks.map((wk, wi) => `<td><input type="number" min="0" step="5" class="ex-field-input" value="${escapeHtml(wk.rest)}" data-role="wk-rest" data-workout-id="${w._uid}" data-idx="${i}" data-week="${wi}"></td>`).join('')}</tr>
            </tbody>
          </table>
        </div>
      </div>`;
  }

  function renderWorkouts() {
    const container = $('workoutsContainer');
    if (!currentProtocol.workouts.length) {
      container.innerHTML = '<div class="card"><div class="empty">Nenhum treino adicionado ainda.</div></div>';
      return;
    }
    container.innerHTML = currentProtocol.workouts.map(w => `
      <div class="workout-block" data-workout-id="${w._uid}">
        <div class="workout-block-header">
          <input type="text" value="${escapeHtml(w.name)}" data-role="workout-name" data-workout-id="${w._uid}">
          <button class="btn danger small" data-role="remove-workout" data-workout-id="${w._uid}">Remover</button>
        </div>
        <div class="exercises-list">
          ${w.exercises.length ? w.exercises.map((ex, i) => renderExerciseRow(w, ex, i)).join('') : '<div class="empty">Nenhum exercício ainda.</div>'}
        </div>
        <div class="search-box">
          <div class="row three" style="grid-template-columns:2fr 1fr;">
            <input type="text" placeholder="Buscar exercício por nome..." data-role="search-input" data-workout-id="${w._uid}" autocomplete="off">
            <select data-role="filter-grupo" data-workout-id="${w._uid}">
              <option value="">Todos os grupos</option>
              ${muscleGroups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('')}
            </select>
          </div>
          <div class="search-results" data-role="search-results" data-workout-id="${w._uid}" style="display:none;"></div>
        </div>
      </div>
    `).join('');

    container.querySelectorAll('[data-role="workout-name"]').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (w) w.name = e.target.value;
      });
    });
    container.querySelectorAll('[data-role="remove-workout"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        currentProtocol.workouts = currentProtocol.workouts.filter(x => x._uid !== e.target.dataset.workoutId);
        renderWorkouts();
      });
    });
    container.querySelectorAll('[data-role="remove-exercise"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (w) w.exercises.splice(Number(e.target.dataset.idx), 1);
        renderWorkouts();
      });
    });
    container.querySelectorAll('[data-role="wk-sets"], [data-role="wk-reps"], [data-role="wk-rest"]').forEach(inp => {
      inp.addEventListener('change', (e) => {
        const w = currentProtocol.workouts.find(x => x._uid === e.target.dataset.workoutId);
        if (!w) return;
        const ex = w.exercises[Number(e.target.dataset.idx)];
        if (!ex) return;
        if (!ex.weeks || !ex.weeks.length) ex.weeks = [defaultWeek()];
        const wk = ex.weeks[Number(e.target.dataset.week)];
        if (!wk) return;
        if (e.target.dataset.role === 'wk-sets') wk.sets = Number(e.target.value) || 1;
        if (e.target.dataset.role === 'wk-reps') wk.reps = e.target.value;
        if (e.target.dataset.role === 'wk-rest') wk.rest = Number(e.target.value) || 0;
      });
    });
    container.querySelectorAll('[data-role="search-input"]').forEach(inp => {
      inp.addEventListener('input', (e) => {
        clearTimeout(searchDebounce);
        const workoutId = e.target.dataset.workoutId;
        const query = e.target.value.trim();
        const resultsBox = container.querySelector(`[data-role="search-results"][data-workout-id="${workoutId}"]`);
        if (query.length < 2) { resultsBox.style.display = 'none'; return; }
        const grupoFilter = container.querySelector(`[data-role="filter-grupo"][data-workout-id="${workoutId}"]`).value;
        searchDebounce = setTimeout(() => searchExercises(query, grupoFilter, workoutId, resultsBox), 300);
      });
    });
    container.querySelectorAll('[data-role="filter-grupo"]').forEach(sel => {
      sel.addEventListener('change', (e) => {
        const workoutId = e.target.dataset.workoutId;
        const searchInput = container.querySelector(`[data-role="search-input"][data-workout-id="${workoutId}"]`);
        const query = searchInput.value.trim();
        const resultsBox = container.querySelector(`[data-role="search-results"][data-workout-id="${workoutId}"]`);
        if (query.length < 2) return;
        searchExercises(query, e.target.value, workoutId, resultsBox);
      });
    });
  }

  async function searchExercises(query, grupoFilter, workoutId, resultsBox) {
    const { data, error } = await supa.rpc('search_exercise_library', { q: query });
    if (error) { console.error(error.message); return; }
    const filtered = grupoFilter ? (data || []).filter(ex => ex.grupo_muscular === grupoFilter) : (data || []);
    if (!filtered.length) {
      resultsBox.innerHTML = '<div class="search-result-item">Nenhum exercício encontrado.</div>';
      resultsBox.style.display = 'block';
      return;
    }
    resultsBox.innerHTML = filtered.map(ex => `
      <div class="search-result-item" data-exercise-id="${ex.exercise_id}">
        ${escapeHtml(ex.nome)}
        <div class="grupo">${escapeHtml(ex.grupo_muscular || '')}</div>
      </div>
    `).join('');
    resultsBox.style.display = 'block';

    resultsBox.querySelectorAll('.search-result-item[data-exercise-id]').forEach(item => {
      item.addEventListener('click', () => {
        const ex = filtered.find(x => String(x.exercise_id) === item.dataset.exerciseId);
        addExerciseToWorkout(workoutId, ex);
        resultsBox.style.display = 'none';
      });
    });
  }

  function addExerciseToWorkout(workoutId, ex) {
    const w = currentProtocol.workouts.find(x => x._uid === workoutId);
    if (!w) return;
    w.exercises.push({
      nome: ex.nome,
      exercise_id: ex.exercise_id,
      exercise_ref: ex.exercise_ref,
      media: ex.gif_url,
      mediaType: 'img',
      weeks: [defaultWeek()],
    });
    renderWorkouts();
  }

  $('addWorkoutBtn').addEventListener('click', () => {
    const letter = String.fromCharCode(65 + currentProtocol.workouts.length);
    currentProtocol.workouts.push({ _uid: uid(), id: letter, name: `Treino ${letter}`, exercises: [] });
    renderWorkouts();
  });

  function stripInternalFields(workouts) {
    return workouts.map(w => ({ id: w.id, name: w.name, exercises: w.exercises }));
  }

  async function saveProtocol(status) {
    currentProtocol.titulo = $('tituloInput').value.trim() || 'Protocolo de treino';
    const payload = {
      professional_id: professional.id,
      student_id: currentProtocol.student_id,
      titulo: currentProtocol.titulo,
      status,
      periodizacao: currentProtocol.periodizacao || 'manual',
      duracao_semanas: currentProtocol.duracao_semanas || null,
      workouts: stripInternalFields(currentProtocol.workouts),
      publicado_em: status === 'publicado' ? new Date().toISOString() : currentProtocol.publicado_em || null,
    };

    let result;
    if (currentProtocol.id) {
      result = await supa.from('training_protocols').update(payload).eq('id', currentProtocol.id).select().single();
    } else {
      result = await supa.from('training_protocols').insert(payload).select().single();
    }

    if (result.error) {
      console.error(result.error.message);
      toast('Erro ao salvar: ' + result.error.message);
      return;
    }
    currentProtocol.id = result.data.id;
    currentProtocol.status = result.data.status;
    renderProtocol();
    toast(status === 'publicado' ? 'Protocolo publicado para o aluno.' : 'Rascunho salvo.');
  }

  $('saveDraftBtn').addEventListener('click', () => saveProtocol('rascunho'));
  $('publishBtn').addEventListener('click', () => saveProtocol('publicado'));

  boot();
</script>
</body>
</html>
