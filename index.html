<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Meu Protocolo — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#F8F9FA; --primary:#2D6BE4; --accent:#3BB08F; --text:#1E2A3A;
    --line:#E2E5EA; --card:#FFFFFF; --muted:#6B7684; --danger:#C0392B; --font:'Inter', sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--line); }
  header h1 { font-size:18px; font-weight:700; margin:0; }
  .trial-banner { background:#FFF4E5; border-bottom:1px solid #F5C98B; color:#8A5A00; font-size:13px; padding:8px 20px; text-align:center; }
  main { max-width:720px; margin:0 auto; padding:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  .student-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); }
  .student-row:last-child { border-bottom:none; }
  .student-name { font-weight:600; font-size:14px; }
  .student-email { font-size:12px; color:var(--muted); }
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .field input { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); font-family:var(--font); }
  .field input:focus { outline:none; border-color:var(--primary); }
  .btn { padding:10px 16px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font); }
  .btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--line); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { font-size:13px; margin-top:8px; }
  .msg.error { color:var(--danger); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#23263a; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:999; }
</style>
</head>
<body>
  <div id="trialBanner" class="trial-banner" style="display:none;"></div>
  <header>
    <h1 id="profName">Meu Protocolo</h1>
    <button class="btn secondary" id="logoutBtn">Sair</button>
  </header>

  <main>
    <div class="card">
      <h2>Adicionar aluno</h2>
      <div class="field">
        <label>Nome</label>
        <input type="text" id="newStudentName" placeholder="Nome do aluno">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="newStudentEmail" placeholder="aluno@email.com">
      </div>
      <button class="btn" id="addStudentBtn">Adicionar aluno</button>
      <div class="msg error" id="addStudentMsg"></div>
    </div>

    <div class="card">
      <h2>Meus alunos</h2>
      <div id="studentsList"><div class="empty">Carregando...</div></div>
    </div>
  </main>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  let professional = null;

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function boot() {
    const { data: { session } } = await supa.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: pro, error } = await supa.from('professionals').select('*').eq('email', session.user.email).maybeSingle();
    if (error) {
      console.error('Falha ao carregar professional:', error.message);
      document.querySelector('main').innerHTML = `<div class="card"><p style="color:var(--danger)">Erro ao carregar sua conta: ${escapeHtml(error.message)}</p></div>`;
      return;
    }
    if (!pro) { window.location.href = 'onboarding.html'; return; }

    professional = pro;
    $('profName').textContent = pro.display_name;

    if (pro.status === 'trial' && pro.trial_ends_at) {
      const daysLeft = Math.ceil((new Date(pro.trial_ends_at) - new Date()) / (1000 * 60 * 60 * 24));
      $('trialBanner').style.display = 'block';
      $('trialBanner').textContent = daysLeft > 0
        ? `Trial gratuito: ${daysLeft} dia(s) restante(s).`
        : 'Seu trial terminou. A cobrança automática deve ocorrer em breve.';
    }

    await loadStudents();
  }

  async function loadStudents() {
    const { data, error } = await supa.from('students').select('*').eq('professional_id', professional.id).order('created_at', { ascending: false });
    const list = $('studentsList');
    if (error) { list.innerHTML = `<div class="empty">Erro ao carregar alunos.</div>`; return; }
    if (!data || data.length === 0) { list.innerHTML = `<div class="empty">Nenhum aluno cadastrado ainda.</div>`; return; }
    list.innerHTML = data.map(s => `
      <div class="student-row">
        <div>
          <div class="student-name">${escapeHtml(s.nome)}</div>
          <div class="student-email">${escapeHtml(s.email)}</div>
        </div>
        <a class="btn secondary" style="padding:7px 12px;font-size:12px;" href="treinos.html?student_id=${s.id}">Montar treino</a>
      </div>
    `).join('');
  }

  $('addStudentBtn').addEventListener('click', async () => {
    const nome = $('newStudentName').value.trim();
    const email = $('newStudentEmail').value.trim().toLowerCase();
    $('addStudentMsg').textContent = '';
    if (!nome || !email || !email.includes('@')) {
      $('addStudentMsg').textContent = 'Preencha nome e e-mail válidos.';
      return;
    }
    $('addStudentBtn').disabled = true;
    const { error } = await supa.from('students').insert({ professional_id: professional.id, nome, email });
    $('addStudentBtn').disabled = false;
    if (error) {
      $('addStudentMsg').textContent = 'Erro: ' + error.message;
      return;
    }
    $('newStudentName').value = '';
    $('newStudentEmail').value = '';
    toast('Aluno adicionado.');
    await loadStudents();
  });

  $('logoutBtn').addEventListener('click', async () => {
    await supa.auth.signOut();
    window.location.href = 'login.html';
  });

  boot();
</script>
</body>
</html>
