<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://drive.google.com https://*.supabase.co; connect-src 'self' https://yumqmramxbahkfxsthtt.supabase.co wss://yumqmramxbahkfxsthtt.supabase.co https://o4511757250199552.ingest.us.sentry.io; object-src 'none'; base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="icons/favicon-32.png">
<title>Meu Protocolo — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://js.sentry-cdn.com/dd3ca3ee7a720284b2a9bf8240b29158.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#F8F9FA;
    --primary:#2D6BE4;
    --accent:#1E8C64;
    --text:#1E2A3A;
    --line:#E9EBEF;
    --card:#FFFFFF;
    --muted:#63707F;
    --font:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --card-grad:linear-gradient(165deg,#FFFFFF 0%,#F7FBF9 55%,#F6F8FE 100%);
  }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--text); font-family:var(--font);
    padding:24px;
  }
  .card {
    width:100%; max-width:380px; background:var(--card-grad); border:1px solid rgba(20,30,45,.05);
    box-shadow:0 14px 34px -12px rgba(20,30,45,.16); border-radius:20px; padding:28px 24px;
  }
  h1 { font-size:22px; font-weight:700; margin:0 0 6px; }
  p.hint { color:var(--muted); font-size:14px; margin:0 0 20px; }
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .field input {
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; font-size:15px; color:var(--text); font-family:var(--font);
  }
  .field input:focus { outline:none; border-color:var(--primary); }
  .btn {
    width:100%; padding:12px 18px; border-radius:10px; font-weight:700; font-size:15px;
    cursor:pointer; border:none; background:var(--primary); color:#fff; font-family:var(--font);
    transition:transform .15s ease;
  }
  .btn:active { transform:scale(.98); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { font-size:13px; margin-top:12px; text-align:center; min-height:18px; }
  .msg.error { color:#C0392B; }
  .msg.ok { color:var(--accent); }
  .back-link { display:block; text-align:center; margin-top:16px; font-size:13px; color:var(--muted); cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
  <div class="card">
    <h1>Meu Protocolo</h1>
    <p class="hint" id="stepHint">Digite seu e-mail para receber um código de acesso.</p>

    <div id="stepEmail">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="emailInput" placeholder="seu@email.com" autocomplete="email">
      </div>
      <button class="btn" id="sendOtpBtn">Enviar código</button>
    </div>

    <div id="stepOtp" style="display:none;">
      <div class="field">
        <label>Código recebido por e-mail</label>
        <input type="text" id="otpInput" placeholder="000000" maxlength="8" inputmode="numeric">
      </div>
      <button class="btn" id="verifyOtpBtn">Confirmar</button>
      <span class="back-link" id="backToEmail">Usar outro e-mail</span>
    </div>

    <div class="msg" id="msgBox"></div>
  </div>

<script>
  const SUPABASE_URL = 'https://yumqmramxbahkfxsthtt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bXFtcmFteGJhaGtmeHN0aHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxNTgsImV4cCI6MjA5ODQ1MDE1OH0.7br_PYBCn1h7lUrCfpJ3VP3HOxMXmoVFyo-GTwVf3Zc';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = (id) => document.getElementById(id);
  const msgBox = $('msgBox');
  let pendingEmail = '';

  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'msg' + (type ? ' ' + type : '');
  }

  $('sendOtpBtn').addEventListener('click', async () => {
    const email = $('emailInput').value.trim().toLowerCase();
    if (!email || !email.includes('@')) {
      showMsg('Digite um e-mail válido.', 'error');
      return;
    }
    $('sendOtpBtn').disabled = true;
    showMsg('Enviando código...', '');
    const { error } = await supa.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });
    $('sendOtpBtn').disabled = false;
    if (error) {
      showMsg('Erro ao enviar código: ' + error.message, 'error');
      return;
    }
    pendingEmail = email;
    $('stepEmail').style.display = 'none';
    $('stepOtp').style.display = 'block';
    $('stepHint').textContent = 'Código enviado para ' + email;
    showMsg('', '');
  });

  $('verifyOtpBtn').addEventListener('click', async () => {
    const token = $('otpInput').value.trim();
    if (!token) {
      showMsg('Digite o código recebido.', 'error');
      return;
    }
    $('verifyOtpBtn').disabled = true;
    showMsg('Verificando...', '');
    const { data, error } = await supa.auth.verifyOtp({ email: pendingEmail, token, type: 'email' });
    $('verifyOtpBtn').disabled = false;
    if (error) {
      showMsg('Código inválido ou expirado: ' + error.message, 'error');
      return;
    }

    const email = data.user.email;

    // E-mail dedicado do painel master (operação, visão de todos os tenants) —
    // checa antes de tudo, sem link público em lugar nenhum apontando pra cá.
    if (email === 'meuprotocolo1@gmail.com') {
      window.location.href = 'master.html';
      return;
    }

    const { data: isPro, error: proErr } = await supa.rpc('is_professional_email', { check_email: email });
    if (proErr) console.error('is_professional_email falhou:', proErr.message);
    if (isPro) {
      // Duas checagens além de "existe profissional com esse e-mail":
      // (1) assinatura cancelada (status 'inativo') bloqueia o acesso durante
      // a retenção de 30 dias — is_professional_email só exclui 'deletado';
      // (2) trial exige cartão cadastrado desde o cadastro — se o profissional
      // ainda não completou essa etapa (fechou o navegador no meio do
      // onboarding), manda de volta pro onboarding em vez do painel.
      const { data: prof } = await supa.from('professionals').select('status, mp_preapproval_id, billing_exempt').eq('email', email).maybeSingle();
      if (prof?.status === 'inativo') {
        showMsg('Sua assinatura está cancelada. Seus dados ficam retidos por um tempo — entre em contato pra reativar: contato@meuprotocolo.app', 'error');
        return;
      }
      // billing_exempt: contas isentas de cobrança (teste interno, programa
      // Founder) nunca vão ter mp_preapproval_id de verdade — sem essa
      // checagem, ficariam presas num loop de volta pro onboarding pra sempre.
      window.location.href = (prof?.mp_preapproval_id || prof?.billing_exempt) ? 'index.html' : 'onboarding.html';
      return;
    }
    const { data: isStudent, error: stuErr } = await supa.rpc('is_student_email', { check_email: email });
    if (stuErr) console.error('is_student_email falhou:', stuErr.message);
    if (isStudent) {
      window.location.href = 'aluno.html';
      return;
    }
    // Primeiro acesso sem cadastro prévio: trata como novo profissional (onboarding)
    window.location.href = 'onboarding.html';
  });

  $('backToEmail').addEventListener('click', () => {
    $('stepOtp').style.display = 'none';
    $('stepEmail').style.display = 'block';
    $('stepHint').textContent = 'Digite seu e-mail para receber um código de acesso.';
    showMsg('', '');
  });
</script>
</body>
</html>
